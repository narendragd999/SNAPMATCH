services:
  postgres:
    image: postgres:15
    container_name: event_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: event_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d event_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: event_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./indexes:/app/indexes
      - ./models:/app/models
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - insightface_models:/root/.insightface
      - ./models:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - PLACES365_MODEL_PATH=/app/models/resnet50_places365.pth.tar
      - MAX_PHOTO_SIZE_MB=20
      - YOLO_MODEL_PATH=yolov8n.pt
    # TODO: remove --reload before going to production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── ORCHESTRATOR WORKER ────────────────────────────────────────────────────
  # Queue:  photo_processing  (also handles process_event dispatch tasks)
  # Role:   Receives process_event(), fans out N × process_single_photo tasks,
  #         wires the chord callback.  Lightweight — no model loading.
  # Pool:   prefork — safe for fan-out, no heavy model state held here.
  # Note:   This worker ALSO handles process_single_photo tasks alongside the
  #         dedicated photo workers below.  All share the same queue.
  celery_orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_orchestrator
    command: >
      celery -A app.workers.celery_worker worker
      -Q photo_processing
      --concurrency=2
      --pool=prefork
      --loglevel=info
      --time-limit=600
      --soft-time-limit=540
      --without-mingle
      --without-gossip
    volumes:
      - ./storage:/app/storage
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    mem_limit: 2g
    restart: unless-stopped

  # ── PHOTO WORKER 1 ─────────────────────────────────────────────────────────
  # Queue:  photo_processing
  # Role:   Executes process_single_photo tasks — optimize + face detect.
  #         Each worker loads InsightFace once at first task; subsequent tasks
  #         reuse the loaded model (warm worker pattern).
  # Pool:   prefork — each forked process has its own InsightFace instance,
  #         no shared model state, no GIL contention.
  # Concurrency: 2 per worker container = 2 photos processed simultaneously.
  #         With 2 worker containers → 4 photos in parallel total.
  #         Tune up if you have more cores; tune down if RAM is tight
  #         (each InsightFace instance costs ~400–600 MB).
  celery_photo_1:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_photo_1
    command: >
      celery -A app.workers.celery_worker worker
      -Q photo_processing
      --concurrency=2
      --pool=prefork
      --loglevel=info
      --time-limit=120
      --soft-time-limit=100
      --without-mingle
      --without-gossip
    volumes:
      - ./storage:/app/storage
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    # Each prefork process loads InsightFace: ~500 MB × 2 = ~1 GB + overhead
    mem_limit: 4g
    restart: unless-stopped

  # ── PHOTO WORKER 2 ─────────────────────────────────────────────────────────
  # Identical to photo_1 — scale horizontally by duplicating this block.
  # To add more parallelism: copy as photo_3, photo_4, etc.
  # On a machine with 8 cores / 16 GB RAM: 3–4 workers × concurrency=2 is safe.
  celery_photo_2:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_photo_2
    command: >
      celery -A app.workers.celery_worker worker
      -Q photo_processing
      --concurrency=2
      --pool=prefork
      --loglevel=info
      --time-limit=120
      --soft-time-limit=100
      --without-mingle
      --without-gossip
    volumes:
      - ./storage:/app/storage
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    mem_limit: 4g
    restart: unless-stopped

  # ── FINALIZER WORKER ───────────────────────────────────────────────────────
  # Queue:  event_finalize
  # Role:   Runs finalize_event() — clustering, merge pass, FAISS rebuild.
  #         Must be concurrency=1 to prevent two events racing through the
  #         clustering logic simultaneously and corrupting the FAISS index.
  # Pool:   solo — single-threaded, lowest overhead, perfectly safe at c=1.
  # Time limit: generous (3600s) — a 5000-photo event can take a while to
  #         cluster and rebuild FAISS.
  celery_finalize:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_finalize
    command: >
      celery -A app.workers.celery_worker worker
      -Q event_finalize
      --concurrency=1
      --pool=solo
      --loglevel=info
      --time-limit=3600
      --soft-time-limit=3300
      --without-mingle
      --without-gossip
    volumes:
      - ./storage:/app/storage
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    # Clustering loads all embeddings into RAM; 6 GB covers ~50k face rows
    mem_limit: 6g
    restart: unless-stopped

  # ── AI ENRICHMENT WORKER ──────────────────────────────────────────────────
  # Queue:  ai_enrichment
  # Role:   Places365 scene classification + YOLO object detection per photo.
  #         Both models are CPU-bound and heavy; concurrency=1 is correct —
  #         running 2 concurrently doubles RAM for no real throughput gain.
  celery_ai:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_ai
    command: >
      celery -A app.workers.celery_worker worker
      -Q ai_enrichment
      --pool=solo
      --loglevel=info
      --time-limit=7200
      --soft-time-limit=7000
      --without-mingle
      --without-gossip
    volumes:
      - ./storage:/app/storage
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - PLACES365_MODEL_PATH=/app/models/resnet50_places365.pth.tar
      - MAX_PHOTO_SIZE_MB=20
      - YOLO_MODEL_PATH=yolov8n.pt
    mem_limit: 4g
    restart: unless-stopped

  # ── DEFAULT WORKER ────────────────────────────────────────────────────────
  # Queue:  default
  # Role:   cleanup_expired_events beat task + any unrouted tasks.
  #         Lightweight — no model loading.
  celery_default:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_default
    command: >
      celery -A app.workers.celery_worker worker
      -Q default
      --pool=solo
      --loglevel=info
      --time-limit=600
      --soft-time-limit=540
      --without-mingle
      --without-gossip
    volumes:
      - ./storage:/app/storage
      - insightface_models:/root/.insightface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    restart: unless-stopped

  # ── BEAT SCHEDULER ────────────────────────────────────────────────────────
  # Runs the daily cleanup_expired_events cron.
  # Must run as a separate process — never co-locate beat with a worker.
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_beat
    command: >
      celery -A app.workers.celery_worker beat
      --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: event_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

volumes:
  postgres_data:
  insightface_models: