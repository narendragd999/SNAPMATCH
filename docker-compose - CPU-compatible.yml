version: "3.9"

services:

  # ─────────────────────────────────────────────
  # DATABASE
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: event_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: event_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # REDIS
  # ─────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: event_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # BACKEND (NO --reload)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./storage:/app/storage
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    mem_limit: 1g
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # ORCHESTRATOR WORKER (LIGHTWEIGHT)
  # Queue: orchestrator
  # ─────────────────────────────────────────────
  celery_orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_orchestrator
    command: >
      celery -A app.workers.celery_worker worker
      -Q orchestrator
      --concurrency=1
      --pool=solo
      --loglevel=info
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    mem_limit: 512m
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # PHOTO WORKER (ML HEAVY)
  # Queue: photo_processing
  # 2 prefork processes max (perfect for 4 cores)
  # ─────────────────────────────────────────────
  celery_photo:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_photo
    command: >
      celery -A app.workers.celery_worker worker
      -Q photo_processing
      --concurrency=2
      --pool=prefork
      --loglevel=info
      --time-limit=180
      --soft-time-limit=150
      --without-mingle
      --without-gossip
    depends_on:
      - postgres
      - redis
    volumes:
      - ./storage:/app/storage
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0

      # 🔥 CRITICAL: Prevent CPU oversubscription
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1

    mem_limit: 4g
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # FINALIZER (CLUSTERING)
  # Queue: event_finalize
  # Must be concurrency=1
  # ─────────────────────────────────────────────
  celery_finalize:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_finalize
    command: >
      celery -A app.workers.celery_worker worker
      -Q event_finalize
      --concurrency=1
      --pool=solo
      --loglevel=info
    depends_on:
      - postgres
      - redis
    volumes:
      - ./indexes:/app/indexes
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
    mem_limit: 2g
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # AI ENRICHMENT (YOLO + Places)
  # Queue: ai_enrichment
  # concurrency=1 is correct
  # ─────────────────────────────────────────────
  celery_ai:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_ai
    command: >
      celery -A app.workers.celery_worker worker
      -Q ai_enrichment
      --concurrency=1
      --pool=solo
      --loglevel=info
    depends_on:
      - postgres
      - redis
    volumes:
      - ./storage:/app/storage
      - ./models:/app/models
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
    mem_limit: 3g
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # DEFAULT WORKER (LIGHT TASKS)
  # ─────────────────────────────────────────────
  celery_default:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_default
    command: >
      celery -A app.workers.celery_worker worker
      -Q default
      --pool=solo
      --loglevel=info
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    mem_limit: 512m
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # BEAT SCHEDULER
  # ─────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: event_celery_beat
    command: celery -A app.workers.celery_worker beat --loglevel=info
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    mem_limit: 256m
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: event_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    mem_limit: 512m
    restart: unless-stopped

volumes:
  postgres_data:
  insightface_models: