server {
    listen 80;

    # Allow uploads up to 1 GB
    client_max_body_size 1G;

    # ── Frontend (Next.js) ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Required for Next.js HMR websocket (local dev)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── Backend API ────────────────────────────────────────────────────────────
    # http://localhost/api/...  →  backend:8000/...
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  60s;
    }

    # ── Swagger / OpenAPI ──────────────────────────────────────────────────────
    # http://localhost/api/docs  is handled by the /api/ block above.
    # This block keeps the bare /openapi.json path working too.
    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }

    # ── Storage (read) — thumbnails and photos ─────────────────────────────────
    # http://localhost/storage/<key>  →  minio:9000/snapfind/<key>
    # NEXT_PUBLIC_STORAGE_URL=/storage uses this path.
    location /storage/ {
        proxy_pass         http://minio:9000/snapfind/;
        proxy_http_version 1.1;
        proxy_set_header   Host minio:9000;
    }

    # ── MinIO presigned PUT uploads (browser → MinIO) ─────────────────────────
    # Used when MINIO_PRESIGN_ENDPOINT points to the nginx host instead of
    # localhost:9000 directly.  On GitHub Actions the Cloudflare tunnel goes
    # straight to port 9000, so this block is only exercised locally if you
    # set MINIO_PRESIGN_ENDPOINT=http://localhost/minio-upload.
    # Default local setup signs with http://localhost:9000, bypassing nginx,
    # so this block is a safe fallback / future-proof addition.
    location /minio-upload/ {
        proxy_pass         http://minio:9000/;
        proxy_http_version 1.1;
        proxy_set_header   Host minio:9000;

        # Stream directly — no buffering
        proxy_buffering         off;
        proxy_request_buffering off;

        # Large individual files
        client_max_body_size 0;

        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout  60s;

        # ── CORS for browser PUT preflight ─────────────────────────────────────
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*'                                                               always;
            add_header 'Access-Control-Allow-Methods' 'PUT, OPTIONS'                                                    always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Amz-Date, X-Amz-Content-Sha256, X-Api-Key' always;
            add_header 'Access-Control-Max-Age'       '86400'                                                           always;
            add_header 'Content-Length' '0';
            return 204;
        }
        add_header 'Access-Control-Allow-Origin'  '*'            always;
        add_header 'Access-Control-Allow-Methods' 'PUT, OPTIONS' always;
    }
}