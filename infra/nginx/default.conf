server {
    listen 80;

    client_max_body_size 1G;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  60s;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }

    # storage proxy (read — thumbnails, photos)
    location /storage/ {
        proxy_pass http://minio:9000/snapfind/;
    }

    # Direct browser → MinIO upload via presigned URLs
    # Bypasses Cloudflare 100MB per-request limit since each file is a
    # separate PUT request with no size restriction from Cloudflare's side.
    location /minio-upload/ {
        proxy_pass http://minio:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host minio:9000;

        # No body buffering — stream directly to MinIO
        proxy_buffering            off;
        proxy_request_buffering    off;

        # Allow large individual files
        client_max_body_size 0;

        # Long timeout for big files on slow connections
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout  60s;
    }
}