name: SnapFind Preview

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration in hours"
        required: false
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "5"

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:

    # 1 Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2 System info
    - name: System info
      run: |
        echo "CPU:"
        nproc
        echo "RAM:"
        free -h
        echo "Disk:"
        df -h

    # 3 Free disk
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /opt/ghc || true
        docker system prune -af || true
        df -h

    # 4 Start Docker stack
    - name: Start Docker containers
      env:
        RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
        RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
      run: |
        docker compose up -d --build
        docker ps

    # 5 Wait for backend
    - name: Wait for backend
      run: |
        echo "Waiting for backend API..."
        for i in {1..30}; do
          if curl -sf http://localhost:8000/docs >/dev/null; then
            echo "Backend ready"
            exit 0
          fi
          sleep 5
        done
        echo "Backend failed to start"
        docker compose logs backend
        exit 1

    # 6 Wait for frontend
    - name: Wait for frontend
      run: |
        echo "Waiting for frontend..."
        for i in {1..30}; do
          if curl -sf http://localhost:3000 >/dev/null; then
            echo "Frontend ready"
            exit 0
          fi
          sleep 5
        done
        echo "Frontend failed"
        docker compose logs frontend
        exit 1

    # 7 Wait for nginx
    - name: Wait for nginx proxy
      run: |
        echo "Waiting for proxy..."
        for i in {1..20}; do
          if curl -sf http://localhost >/dev/null; then
            echo "Proxy ready"
            exit 0
          fi
          sleep 3
        done
        echo "Proxy failed"
        docker compose logs nginx
        exit 1

    # 8 Install cloudflared
    - name: Install Cloudflare tunnel
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        cloudflared --version

    # 9 Start Cloudflare tunnels — one for the app, one for MinIO direct PUT
    #
    # Why two tunnels?
    #   The app tunnel (localhost:80) goes through nginx and is fine for API
    #   calls and page loads. But presigned PUT URLs must point to MinIO
    #   directly (localhost:9000) so the browser can PUT files without going
    #   through the backend. Both tunnels are on HTTPS, so no Mixed Content.
    - name: Start Cloudflare Tunnels
      run: |
        start_tunnel() {
          local NAME="$1"
          local TARGET="$2"
          local LOGFILE="$3"
          local URL_VAR="$4"

          echo "Starting $NAME tunnel → $TARGET ..."
          for attempt in 1 2 3 4 5; do
            echo "  Attempt $attempt..."
            pkill -f "cloudflared tunnel.*$TARGET" || true
            rm -f "$LOGFILE"
            sleep 3

            cloudflared tunnel --url "$TARGET" > "$LOGFILE" 2>&1 &

            for i in $(seq 1 30); do
              sleep 1
              FOUND=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' "$LOGFILE" | head -n 1)
              if [ -n "$FOUND" ]; then break; fi
            done

            if [ -n "$FOUND" ]; then
              echo "  $NAME tunnel ready: $FOUND"
              echo "${URL_VAR}=${FOUND}" >> "$GITHUB_ENV"
              return 0
            fi

            echo "  Attempt $attempt failed. Log:"
            cat "$LOGFILE"
          done

          echo "ERROR: Could not establish $NAME tunnel after 5 attempts"
          cat "$LOGFILE"
          return 1
        }

        # App tunnel (nginx → frontend + backend API)
        start_tunnel "App"   "http://localhost:80"   "tunnel-app.log"   "PREVIEW_URL"

        # MinIO tunnel (direct to MinIO for presigned PUT uploads)
        start_tunnel "MinIO" "http://localhost:9000" "tunnel-minio.log" "MINIO_TUNNEL_URL"

        echo ""
        echo "================================="
        echo " SnapFind Preview is LIVE"
        echo "================================="
        echo ""
        echo "Frontend:      $PREVIEW_URL"
        echo "Backend docs:  $PREVIEW_URL/api/docs"
        echo "MinIO tunnel:  $MINIO_TUNNEL_URL  (presigned PUT target)"
        echo ""

    # 10 Inject MINIO_PRESIGN_ENDPOINT into the running backend container
    #
    # The backend container started before the MinIO tunnel URL existed, so we
    # couldn't pass it at compose-up time. We append to .env and use
    # `docker compose up --no-deps --force-recreate` to rebuild ONLY the
    # backend container with the new var. All other containers stay running.
    - name: Inject MinIO presign endpoint into backend
      run: |
        echo "MINIO_PRESIGN_ENDPOINT = $MINIO_TUNNEL_URL"

        # Append to the repo .env file so every subsequent docker compose
        # command in this job sees the var automatically.
        echo "MINIO_PRESIGN_ENDPOINT=$MINIO_TUNNEL_URL" >> .env

        # Recreate ONLY the backend container with the updated env.
        #   --no-deps        : don't touch db/redis/minio/nginx/frontend
        #   --force-recreate : always create fresh even if image unchanged
        MINIO_PRESIGN_ENDPOINT="$MINIO_TUNNEL_URL"           docker compose up -d --no-deps --force-recreate backend

        # Wait for backend to come back healthy
        echo "Waiting for backend after recreate..."
        for i in {1..30}; do
          if curl -sf http://localhost:8000/docs >/dev/null; then
            echo "Backend ready"
            break
          fi
          sleep 3
        done

        # Confirm the var is live inside the new container
        BACKEND=$(docker ps --format '{{.Names}}' | grep -i backend | head -n1)
        LIVE=$(docker exec "$BACKEND" printenv MINIO_PRESIGN_ENDPOINT 2>/dev/null || true)
        if [ "$LIVE" = "$MINIO_TUNNEL_URL" ]; then
          echo "✓ MINIO_PRESIGN_ENDPOINT confirmed: $LIVE"
        else
          echo "WARNING: var mismatch. Got='$LIVE'  Expected='$MINIO_TUNNEL_URL'"
          docker exec "$BACKEND" printenv | grep -i minio || true
        fi

    # 11 Keep preview alive
    - name: Keep preview alive
      env:
        PREVIEW_DURATION: ${{ github.event.inputs.duration_hours || '2' }}
      run: |
        SECONDS=$(( PREVIEW_DURATION * 3600 ))
        for ((i=0;i<$SECONDS;i+=60)); do
          sleep 60
          REM=$(( (SECONDS-i)/60 ))
          echo "Preview running... $REM minutes remaining"
          curl -sf http://localhost/api/docs >/dev/null || echo "Backend check failed"
        done

    # 12 Show logs if failure
    - name: Show logs on failure
      if: failure()
      run: |
        docker compose logs backend --tail=50
        docker compose logs frontend --tail=50
        docker compose logs nginx --tail=50
        cat tunnel-app.log   || true
        cat tunnel-minio.log || true

    # 13 Cleanup
    - name: Cleanup
      if: always()
      run: |
        pkill cloudflared || true
        docker compose down -v
        echo "Cleanup complete"

    - name: Show System Resources
      run: |
        echo "================ CPU ================="
        echo "Number of CPU cores:"
        nproc
        echo ""
        echo "CPU Details:"
        lscpu
        echo ""
        echo "================ RAM ================="
        free -h
        echo ""
        echo "================ DISK ================="
        df -h
        echo ""
        echo "================ DOCKER CONTAINERS ================="
        docker ps
        echo ""
        echo "================ DOCKER RESOURCE USAGE ================="
        docker stats --no-stream
