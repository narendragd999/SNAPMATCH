name: SnapFind Preview

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration in hours"
        required: false
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "5"
      reset_processing:
        description: "Reset processing state (keep photos, re-process)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:

    # 1 Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2 System info
    - name: System info
      run: |
        echo "CPU:"
        nproc
        echo "RAM:"
        free -h
        echo "Disk:"
        df -h

    # 3 Free disk
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /opt/ghc || true
        docker system prune -af || true
        df -h

    # 4 Write GHA .env
    - name: Write GHA .env
      run: |
        cat > .env << 'EOF'
        SECRET_KEY=${{ secrets.SECRET_KEY || 'gha-preview-secret-key' }}
        ENV=prod

        # Storage
        STORAGE_BACKEND=minio
        MINIO_ENDPOINT=http://minio:9000
        MINIO_ACCESS_KEY=minioadmin
        MINIO_SECRET_KEY=minioadmin
        MINIO_BUCKET=snapfind
        MINIO_PUBLIC_URL=/storage
        MINIO_PRESIGN_ENDPOINT=

        # Payments
        RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
        RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}

        # SMTP
        SMTP_HOST=${{ secrets.SMTP_HOST || '' }}
        SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
        SMTP_USER=${{ secrets.SMTP_USER || '' }}
        SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD || '' }}
        SMTP_FROM=${{ secrets.SMTP_FROM || '' }}

        # Frontend — relative paths so the Cloudflare tunnel origin is used
        NEXT_PUBLIC_API_URL=/api
        NEXT_PUBLIC_STORAGE_URL=/storage
        NEXT_PUBLIC_STORAGE_BACKEND=minio
        EOF

    # 5 Start Docker stack
    - name: Start containers
      run: |
        docker compose up -d --build
        docker ps

    # 6 Wait for backend
    - name: Wait for backend
      run: |
        echo "Waiting for backend..."
        for i in {1..30}; do
          if curl -sf http://localhost:8000/docs >/dev/null; then
            echo "Backend ready"
            exit 0
          fi
          sleep 5
        done
        echo "Backend failed to start"
        docker compose logs backend --tail=50
        exit 1

    # 7 Wait for frontend
    - name: Wait for frontend
      run: |
        echo "Waiting for frontend..."
        for i in {1..30}; do
          if curl -sf http://localhost:3000 >/dev/null; then
            echo "Frontend ready"
            exit 0
          fi
          sleep 5
        done
        echo "Frontend failed to start"
        docker compose logs frontend --tail=50
        exit 1

    # 8 Install cloudflared
    - name: Install Cloudflare tunnel
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        cloudflared --version

    # 9 Start Cloudflare tunnels — App + MinIO
    - name: Start Cloudflare Tunnels
      run: |
        start_tunnel() {
          local NAME="$1"
          local TARGET="$2"
          local LOGFILE="$3"
          local URL_VAR="$4"

          echo "Starting $NAME tunnel -> $TARGET ..."
          for attempt in 1 2 3 4 5; do
            echo "  Attempt $attempt..."
            pkill -f "cloudflared tunnel.*$TARGET" || true
            rm -f "$LOGFILE"
            sleep 3

            cloudflared tunnel --url "$TARGET" > "$LOGFILE" 2>&1 &

            for i in $(seq 1 30); do
              sleep 1
              FOUND=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' "$LOGFILE" | head -n 1)
              if [ -n "$FOUND" ]; then break; fi
            done

            if [ -n "$FOUND" ]; then
              echo "  $NAME tunnel ready: $FOUND"
              echo "${URL_VAR}=${FOUND}" >> "$GITHUB_ENV"
              return 0
            fi

            echo "  Attempt $attempt failed. Log:"
            cat "$LOGFILE"
          done

          echo "ERROR: Could not establish $NAME tunnel after 5 attempts"
          cat "$LOGFILE"
          return 1
        }

        # App tunnel (nginx -> frontend + backend API)
        start_tunnel "App"   "http://localhost:80"   "tunnel-app.log"   "PREVIEW_URL"

        # MinIO tunnel (direct to MinIO for presigned PUT uploads)
        start_tunnel "MinIO" "http://localhost:9000" "tunnel-minio.log" "MINIO_TUNNEL_URL"

    # 10 Inject MinIO presign endpoint into backend
    - name: Inject MinIO presign endpoint into backend
      run: |
        echo "MINIO_PRESIGN_ENDPOINT = $MINIO_TUNNEL_URL"
        sed -i "s|MINIO_PRESIGN_ENDPOINT=.*|MINIO_PRESIGN_ENDPOINT=$MINIO_TUNNEL_URL|" .env
        echo "MINIO_PRESIGN_ENDPOINT=$MINIO_TUNNEL_URL" >> .env
        docker compose up -d --no-deps backend
        sleep 5
        echo "Backend restarted with new presign endpoint"

    # 11 Start Redis + PostgreSQL HTTP proxies and tunnels for Colab GPU worker
    - name: Start Redis and DB proxies for Colab GPU
      run: |
        pip install flask redis psycopg2-binary -q

        # ── Redis HTTP proxy ──────────────────────────────────────────────
        cat > /tmp/redis_proxy.py << 'PYEOF'
import redis, json
from flask import Flask, request, jsonify

app = Flask(__name__)
r   = redis.Redis(host='localhost', port=6379, db=0)

@app.route('/health')
def health():
    return jsonify({'status': 'ok', 'redis': str(r.ping())})

@app.route('/execute', methods=['POST'])
def execute():
    d      = request.json
    cmd    = d['cmd']
    args   = d.get('args', [])
    result = getattr(r, cmd)(*args)
    if isinstance(result, bytes):
        result = result.decode()
    elif isinstance(result, list):
        result = [x.decode() if isinstance(x, bytes) else x for x in result]
    elif isinstance(result, tuple):
        result = [x.decode() if isinstance(x, bytes) else x for x in result]
    return jsonify({'result': result})

if __name__ == '__main__':
    app.run(host='0.0.0.0', port=6380, threaded=True)
PYEOF

        python /tmp/redis_proxy.py > /tmp/redis_proxy.log 2>&1 &
        sleep 3
        curl -sf http://localhost:6380/health && echo "✅ Redis proxy up" || echo "❌ Redis proxy failed"

        # ── PostgreSQL HTTP proxy ─────────────────────────────────────────
        cat > /tmp/db_proxy.py << 'PYEOF'
import psycopg2, psycopg2.extras, json
from flask import Flask, request, jsonify

app = Flask(__name__)
DSN = 'postgresql://postgres:admin123@localhost:5432/event_ai'

def get_conn():
    return psycopg2.connect(DSN)

@app.route('/health')
def health():
    conn = get_conn(); conn.close()
    return jsonify({'status': 'ok'})

@app.route('/query', methods=['POST'])
def query():
    d    = request.json
    sql  = d['sql']
    args = d.get('args', [])
    conn = get_conn()
    cur  = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
    cur.execute(sql, args)
    if sql.strip().upper().startswith('SELECT'):
        rows = [dict(r) for r in cur.fetchall()]
        conn.close()
        return jsonify({'rows': rows})
    conn.commit()
    rc = cur.rowcount
    conn.close()
    return jsonify({'rowcount': rc})

if __name__ == '__main__':
    app.run(host='0.0.0.0', port=5433, threaded=True)
PYEOF

        python /tmp/db_proxy.py > /tmp/db_proxy.log 2>&1 &
        sleep 3
        curl -sf http://localhost:5433/health && echo "✅ DB proxy up" || echo "❌ DB proxy failed"

        # ── Cloudflare tunnel for Redis proxy ─────────────────────────────
        cloudflared tunnel --url http://localhost:6380 > /tmp/redis-tunnel.log 2>&1 &
        sleep 10
        REDIS_TUNNEL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' /tmp/redis-tunnel.log | head -1)
        echo "REDIS_TUNNEL_URL=$REDIS_TUNNEL" >> $GITHUB_ENV
        echo "Redis tunnel: $REDIS_TUNNEL"

        # ── Cloudflare tunnel for DB proxy ────────────────────────────────
        cloudflared tunnel --url http://localhost:5433 > /tmp/db-tunnel.log 2>&1 &
        sleep 10
        DB_TUNNEL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' /tmp/db-tunnel.log | head -1)
        echo "DB_TUNNEL_URL=$DB_TUNNEL" >> $GITHUB_ENV
        echo "DB tunnel: $DB_TUNNEL"

    # 12 Print all URLs including Colab GPU worker config
    - name: Print all tunnel URLs
      run: |
        echo ""
        echo "================================="
        echo " SnapFind Preview is LIVE"
        echo "================================="
        echo " App:          $PREVIEW_URL"
        echo " API docs:     $PREVIEW_URL/api/docs"
        echo " MinIO tunnel: $MINIO_TUNNEL_URL"
        echo " Redis tunnel: $REDIS_TUNNEL_URL"
        echo " DB tunnel:    $DB_TUNNEL_URL"
        echo "================================="
        echo ""
        echo "=== COLAB GPU WORKER CONFIG ==="
        echo " BACKEND_URL = $PREVIEW_URL/api"
        echo " MINIO_URL   = $MINIO_TUNNEL_URL"
        echo " REDIS_URL   = $REDIS_TUNNEL_URL"
        echo " DB_URL      = $DB_TUNNEL_URL"
        echo "================================="

    # 13 Verify presign upload works
    - name: Verify presign upload
      run: |
        sleep 5
        REGISTER_RESP=$(curl -s -X POST http://localhost/api/auth/register \
          -H "Content-Type: application/json" \
          -d '{"email":"verify@test.com","password":"verify123"}')
        echo "Register: $REGISTER_RESP"

        TOKEN=$(echo "$REGISTER_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || echo "")

        if [ -n "$TOKEN" ]; then
          FREE_RESP=$(curl -s -X POST http://localhost/api/billing/create-free-event \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"event_name":"verify-test"}')
          EVENT_ID=$(echo "$FREE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('event_id',''))" 2>/dev/null || echo "")
          echo "Event ID: $EVENT_ID"

          if [ -n "$EVENT_ID" ]; then
            PRESIGN_RESP=$(curl -s -X POST "http://localhost/api/upload/${EVENT_ID}/presign" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $TOKEN" \
              -d '{"filenames":["test.jpg"]}')
            echo "Presign response: $PRESIGN_RESP"
          fi
        fi

    # 14 Reset processing state (optional)
    - name: Reset processing state
      if: ${{ github.event.inputs.reset_processing == 'true' }}
      run: |
        echo "Resetting processing state — keeping photos..."
        docker exec -i event_postgres psql -U postgres -d event_ai << 'SQL'
          UPDATE photos
          SET status='uploaded', optimized_filename=NULL, faces_detected=0
          WHERE status IN ('processed','failed');

          DELETE FROM clusters;

          UPDATE events
          SET processing_status='pending', processing_progress=0,
              processing_started_at=NULL, processing_completed_at=NULL,
              total_clusters=0, total_faces=0
          WHERE processing_status IN ('completed','processing','failed');

          SELECT id, name, processing_status, total_clusters, total_faces FROM events;
          SELECT event_id, status, COUNT(*) FROM photos GROUP BY event_id, status;
        SQL
        echo "Reset complete — photos kept, processing state cleared"

    # 15 Keep preview alive
    - name: Keep preview alive
      env:
        PREVIEW_DURATION: ${{ github.event.inputs.duration_hours || '2' }}
      run: |
        echo ""
        echo "================================="
        echo " SnapFind Preview is LIVE"
        echo "================================="
        echo " App:          $PREVIEW_URL"
        echo " API docs:     $PREVIEW_URL/api/docs"
        echo " MinIO tunnel: $MINIO_TUNNEL_URL"
        echo " Redis tunnel: $REDIS_TUNNEL_URL"
        echo " DB tunnel:    $DB_TUNNEL_URL"
        echo "================================="
        echo ""

        SECONDS_LEFT=$(( PREVIEW_DURATION * 3600 ))
        for ((i=0; i<SECONDS_LEFT; i+=60)); do
          sleep 60
          REM=$(( (SECONDS_LEFT - i) / 60 ))
          echo "[$REM min remaining] App: $PREVIEW_URL | Redis: $REDIS_TUNNEL_URL | DB: $DB_TUNNEL_URL"
          curl -sf http://localhost/api/docs >/dev/null || echo "  WARNING: backend health check failed"
        done

    # 16 Show logs on failure
    - name: Show logs on failure
      if: failure()
      run: |
        docker compose logs backend  --tail=50
        docker compose logs frontend --tail=50
        docker compose logs nginx    --tail=50
        cat tunnel-app.log   || true
        cat tunnel-minio.log || true
        cat /tmp/redis-tunnel.log || true
        cat /tmp/db-tunnel.log    || true
        cat /tmp/redis_proxy.log  || true
        cat /tmp/db_proxy.log     || true

    # 17 Cleanup
    - name: Cleanup
      if: always()
      run: |
        pkill cloudflared || true
        pkill -f redis_proxy || true
        pkill -f db_proxy    || true
        docker compose down -v
        echo "Cleanup complete"

    # 18 Show system resources
    - name: Show System Resources
      run: |
        echo "================ CPU ================="
        nproc
        lscpu
        echo "================ RAM ================="
        free -h
        echo "================ DISK ================="
        df -h
        echo "================ DOCKER CONTAINERS ================="
        docker ps
        echo "================ DOCKER RESOURCE USAGE ================="
        docker stats --no-stream