name: SnapFind Preview

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration in hours"
        required: false
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "5"

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:

    # 1 Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v4


    # 2 System info
    - name: System info
      run: |
        echo "CPU:"
        nproc
        echo "RAM:"
        free -h
        echo "Disk:"
        df -h


    # 3 Free disk
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /opt/ghc || true
        docker system prune -af || true
        df -h


    # 4 Start Docker stack
    - name: Start Docker containers
      run: |
        docker compose up -d --build
        docker ps


    # 5 Wait for backend
    - name: Wait for backend
      run: |
        echo "Waiting for backend API..."
        for i in {1..30}; do
          if curl -sf http://localhost:8000/docs >/dev/null; then
            echo "Backend ready"
            exit 0
          fi
          sleep 5
        done

        echo "Backend failed to start"
        docker compose logs backend
        exit 1


    # 6 Wait for frontend
    - name: Wait for frontend
      run: |
        echo "Waiting for frontend..."
        for i in {1..30}; do
          if curl -sf http://localhost:3000 >/dev/null; then
            echo "Frontend ready"
            exit 0
          fi
          sleep 5
        done

        echo "Frontend failed"
        docker compose logs frontend
        exit 1


    # 7 Wait for nginx
    - name: Wait for nginx proxy
      run: |
        echo "Waiting for proxy..."
        for i in {1..20}; do
          if curl -sf http://localhost >/dev/null; then
            echo "Proxy ready"
            exit 0
          fi
          sleep 3
        done

        echo "Proxy failed"
        docker compose logs nginx
        exit 1


    # 8 Install cloudflared
    - name: Install Cloudflare tunnel
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        cloudflared --version


    # 9 Start Cloudflare quick tunnel
    - name: Start Cloudflare Tunnel
      run: |
        echo "Starting Cloudflare tunnel..."

        cloudflared tunnel --url http://localhost:80 \
          > tunnel.log 2>&1 &

        sleep 10

        echo "Tunnel log:"
        cat tunnel.log

        PREVIEW_URL=$(grep -o 'https://.*trycloudflare.com' tunnel.log | head -n 1)

        echo ""
        echo "================================="
        echo " SnapFind Preview is LIVE"
        echo "================================="
        echo ""
        echo "Frontend:"
        echo "$PREVIEW_URL"
        echo ""
        echo "Backend API Docs:"
        echo "$PREVIEW_URL/api/docs"
        echo ""

        echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV


    # 10 Keep preview alive
    - name: Keep preview alive
      env:
        PREVIEW_DURATION: ${{ github.event.inputs.duration_hours || '2' }}
      run: |
        SECONDS=$(( PREVIEW_DURATION * 3600 ))

        for ((i=0;i<$SECONDS;i+=60)); do
          sleep 60
          REM=$(( (SECONDS-i)/60 ))
          echo "Preview running... $REM minutes remaining"

          curl -sf http://localhost/api/docs >/dev/null || echo "Backend check failed"
        done


    # 11 Show logs if failure
    - name: Show logs on failure
      if: failure()
      run: |
        docker compose logs backend --tail=50
        docker compose logs frontend --tail=50
        docker compose logs nginx --tail=50
        cat tunnel.log || true


    # 12 Cleanup
    - name: Cleanup
      if: always()
      run: |
        pkill cloudflared || true
        docker compose down -v
        echo "Cleanup complete"
        
    - name: Show System Resources
      run: |
        echo "================ CPU ================="
        echo "Number of CPU cores:"
        nproc
        echo ""
        echo "CPU Details:"
        lscpu
    
        echo ""
        echo "================ RAM ================="
        free -h
    
        echo ""
        echo "================ DISK ================="
        df -h
    
        echo ""
        echo "================ DOCKER CONTAINERS ================="
        docker ps
    
        echo ""
        echo "================ DOCKER RESOURCE USAGE ================="
        docker stats --no-stream
