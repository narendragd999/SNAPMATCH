name: SnapFind Preview

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration in hours"
        required: false
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "5"
      force_clean:
        description: "Force clean Docker build (prune cache + rebuild from scratch)"
        required: false
        default: false
        type: boolean
      enable_db_ui:
        description: "Expose Postgres via pgweb browser UI (adds ~30s startup)"
        required: false
        default: false
        type: boolean
      enable_minio_console:
        description: "Expose MinIO Console web UI on a public tunnel URL"
        required: false
        default: false
        type: boolean
      show_celery_logs:
        description: "Stream live Celery worker logs in the GHA output"
        required: false
        default: true
        type: boolean

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:

    # 1 Checkout
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2 Free disk.
    #   Always: remove large unused system packages (~15 GB, no Docker impact).
    #   force_clean=true: also run docker system prune -af to bust all layer
    #   cache — use this when stale layers are causing issues (missing changes,
    #   dependency conflicts, corrupt cache). Normal runs skip the prune so
    #   cached layers survive for fast incremental rebuilds.
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
        df -h

    - name: Force clean Docker cache (only when requested)
      if: ${{ github.event.inputs.force_clean == 'true' }}
      run: |
        echo "force_clean=true — pruning all Docker layers and build cache"
        docker system prune -af
        docker builder prune -af
        df -h
        echo "Clean done — this run will rebuild all images from scratch"

    # 3 Set up Docker Buildx with GHA cache driver.
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5 Cache pip packages
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-flask-redis-psycopg2
        restore-keys: |
          ${{ runner.os }}-pip-

    # 6 Install Python proxy dependencies early
    - name: Install proxy dependencies
      run: pip install flask redis psycopg2-binary -q

    # 7 Write GHA .env
    - name: Write GHA .env
      run: |
        cat > .env << 'EOF'
        SECRET_KEY=${{ secrets.SECRET_KEY || 'gha-preview-secret-key' }}
        ENV=prod

        # Storage
        STORAGE_BACKEND=minio
        MINIO_ENDPOINT=http://minio:9000
        MINIO_ACCESS_KEY=minioadmin
        MINIO_SECRET_KEY=minioadmin
        MINIO_BUCKET=snapfind
        MINIO_PUBLIC_URL=/storage
        MINIO_PRESIGN_ENDPOINT=

        # Payments
        RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
        RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}

        # SMTP
        SMTP_HOST=${{ secrets.SMTP_HOST || '' }}
        SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
        SMTP_USER=${{ secrets.SMTP_USER || '' }}
        SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD || '' }}
        SMTP_FROM=${{ secrets.SMTP_FROM || '' }}

        # Frontend — relative paths so the Cloudflare tunnel origin is used.
        NEXT_PUBLIC_API_URL=/api
        NEXT_PUBLIC_STORAGE_URL=/storage
        NGINX_PORT=80

        # AI models
        MAX_PHOTO_SIZE_MB=20
        PLACES365_MODEL_PATH=/app/models/resnet50_places365.pth.tar
        YOLO_MODEL_PATH=yolov8n.pt
        DEFAULT_EVENT_PIN=0000
        EOF
        sed -i 's/^[[:space:]]*//' .env
        echo "--- .env written ---"
        cat .env | grep -v SECRET | grep -v PASSWORD | grep -v KEY

    # 8 Build and start Docker stack.
    - name: Start Docker containers
      env:
        DOCKER_BUILDKIT: "1"
        COMPOSE_DOCKER_CLI_BUILD: "1"
        BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
      run: |
        docker compose build --parallel
        docker compose up -d
        docker ps

    # 9 Wait for all services in parallel
    - name: Wait for services
      run: |
        wait_for() {
          local NAME="$1" URL="$2" MAX="$3" INTERVAL="$4"
          for i in $(seq 1 "$MAX"); do
            if curl -sf "$URL" >/dev/null 2>&1; then
              echo "$NAME ready (attempt $i)"
              return 0
            fi
            sleep "$INTERVAL"
          done
          echo "$NAME failed to start"
          return 1
        }

        wait_for "Backend"  "http://localhost:8000/docs" 40 3 & PID_BACKEND=$!
        wait_for "Frontend" "http://localhost:3000"      40 3 & PID_FRONTEND=$!
        wait_for "Nginx"    "http://localhost"           30 3 & PID_NGINX=$!

        FAIL=0
        wait "$PID_BACKEND"  || FAIL=1
        wait "$PID_FRONTEND" || FAIL=1
        wait "$PID_NGINX"    || FAIL=1

        if [ "$FAIL" -eq 1 ]; then
          echo "One or more services failed to start"
          docker compose logs backend  --tail=30
          docker compose logs frontend --tail=30
          docker compose logs nginx    --tail=30
          exit 1
        fi
        echo "All services ready"

    # 11 Seed default users
    # Uses base64-encoded script to avoid heredoc/YAML indentation conflicts.
    - name: Seed default users
      run: |
        echo '' | base64 -d | docker exec -i event_backend python3

    # 11 Install cloudflared
    - name: Install Cloudflare tunnel
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        cloudflared --version

    # 11 Start BOTH Cloudflare tunnels in parallel.
    - name: Start Cloudflare Tunnels
      run: |
        start_tunnel() {
          local NAME="$1" TARGET="$2" LOGFILE="$3"
          for attempt in 1 2 3 4 5; do
            pkill -f "cloudflared tunnel.*$TARGET" 2>/dev/null || true
            rm -f "$LOGFILE"
            cloudflared tunnel --url "$TARGET" > "$LOGFILE" 2>&1 &
            for i in $(seq 1 30); do
              sleep 1
              FOUND=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' "$LOGFILE" | head -n 1)
              [ -n "$FOUND" ] && break
            done
            if [ -n "$FOUND" ]; then
              echo "$NAME=$FOUND" >> /tmp/tunnel_urls
              echo "$NAME tunnel ready: $FOUND"
              return 0
            fi
            echo "  $NAME attempt $attempt failed"
          done
          echo "ERROR: $NAME tunnel failed after 5 attempts"
          cat "$LOGFILE"
          return 1
        }

        start_tunnel "PREVIEW_URL"      "http://localhost:80"   "tunnel-app.log"   & PID_APP=$!
        start_tunnel "MINIO_TUNNEL_URL" "http://localhost:9000" "tunnel-minio.log" & PID_MINIO=$!

        FAIL=0
        wait "$PID_APP"   || FAIL=1
        wait "$PID_MINIO" || FAIL=1
        [ "$FAIL" -eq 1 ] && exit 1

        PREVIEW_URL=$(grep '^PREVIEW_URL=' /tmp/tunnel_urls | cut -d= -f2-)
        MINIO_TUNNEL_URL=$(grep '^MINIO_TUNNEL_URL=' /tmp/tunnel_urls | cut -d= -f2-)
        echo "PREVIEW_URL=$PREVIEW_URL"           >> "$GITHUB_ENV"
        echo "MINIO_TUNNEL_URL=$MINIO_TUNNEL_URL" >> "$GITHUB_ENV"

        echo ""
        echo "================================="
        echo " SnapFind Preview is LIVE"
        echo "================================="
        echo " App URL:      $PREVIEW_URL"
        echo " API docs:     $PREVIEW_URL/api/docs"
        echo " MinIO tunnel: $MINIO_TUNNEL_URL"
        echo "================================="

    # 12 Inject MINIO_PRESIGN_ENDPOINT into running backend
    - name: Inject MinIO presign endpoint into backend
      run: |
        echo "MINIO_PRESIGN_ENDPOINT = $MINIO_TUNNEL_URL"
        sed -i "s|MINIO_PRESIGN_ENDPOINT=.*|MINIO_PRESIGN_ENDPOINT=$MINIO_TUNNEL_URL|" .env

        MINIO_PRESIGN_ENDPOINT="$MINIO_TUNNEL_URL" \
          docker compose up -d --no-deps --force-recreate backend

        for i in {1..30}; do
          curl -sf http://localhost:8000/docs >/dev/null && echo "Backend ready" && break
          sleep 2
        done

        BACKEND=$(docker ps --format '{{.Names}}' | grep -i backend | head -n1)
        LIVE=$(docker exec "$BACKEND" printenv MINIO_PRESIGN_ENDPOINT 2>/dev/null || true)
        if [ "$LIVE" = "$MINIO_TUNNEL_URL" ]; then
          echo "MINIO_PRESIGN_ENDPOINT confirmed: $LIVE"
        else
          echo "ERROR: var not found. Got: '$LIVE', Expected: '$MINIO_TUNNEL_URL'"
          docker exec "$BACKEND" printenv | grep -i minio || true
          exit 1
        fi

        PRESIGN_RESP=$(curl -sf -X POST \
          -H "Content-Type: application/json" \
          -d '{"filenames":["test.jpg"]}' \
          http://localhost:8000/uploads/1/presign 2>/dev/null || true)
        echo "$PRESIGN_RESP" | grep -q "https://" \
          && echo "Presign endpoint returns HTTPS URLs" \
          || echo "WARNING: Presign smoke-test inconclusive. Response: $PRESIGN_RESP"

    # 13 Start Redis + DB proxies and tunnels for Colab GPU worker
    - name: Start Redis and DB proxies for Colab GPU
      run: |
        python3 .github/scripts/redis_proxy.py > /tmp/redis_proxy.log 2>&1 &
        python3 .github/scripts/db_proxy.py    > /tmp/db_proxy.log    2>&1 &

        for svc in "Redis:http://localhost:6380/health" "DB:http://localhost:5433/health"; do
          NAME="${svc%%:*}" URL="${svc#*:}"
          for i in {1..15}; do
            curl -sf "$URL" >/dev/null && echo "$NAME proxy up" && break
            sleep 1
          done
        done

        cloudflared tunnel --url http://localhost:6380 > /tmp/redis-tunnel.log 2>&1 &
        cloudflared tunnel --url http://localhost:5433 > /tmp/db-tunnel.log    2>&1 &

        for i in $(seq 1 20); do
          sleep 1
          REDIS_TUNNEL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' /tmp/redis-tunnel.log | head -1)
          DB_TUNNEL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' /tmp/db-tunnel.log | head -1)
          [ -n "$REDIS_TUNNEL" ] && [ -n "$DB_TUNNEL" ] && break
        done

        echo "REDIS_TUNNEL_URL=$REDIS_TUNNEL" >> "$GITHUB_ENV"
        echo "DB_TUNNEL_URL=$DB_TUNNEL"       >> "$GITHUB_ENV"
        echo "Redis tunnel: $REDIS_TUNNEL"
        echo "DB tunnel:    $DB_TUNNEL"

    # 14 pgweb (Postgres browser UI)
    - name: Start pgweb (Postgres UI)
      if: ${{ github.event.inputs.enable_db_ui == 'true' }}
      run: |
        if docker inspect event_postgres >/dev/null 2>&1; then
          PG_CONTAINER="event_postgres"
          echo "Using known container: event_postgres"
        else
          PG_CONTAINER=$(docker ps --format '{{.Names}} {{.Image}}' \
            | grep -i postgres | awk '{print $1}' | head -1)
          echo "Auto-detected container: $PG_CONTAINER"
        fi

        if [ -z "$PG_CONTAINER" ]; then
          echo "ERROR: No running postgres container found."
          docker ps --format '{{.Names}}\t{{.Image}}'
          exit 1
        fi

        DB_USER=$(docker exec "$PG_CONTAINER" printenv POSTGRES_USER     2>/dev/null || echo "postgres")
        DB_PASS=$(docker exec "$PG_CONTAINER" printenv POSTGRES_PASSWORD  2>/dev/null || echo "admin123")
        DB_NAME=$(docker exec "$PG_CONTAINER" printenv POSTGRES_DB        2>/dev/null || echo "event_ai")

        PG_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' "$PG_CONTAINER" | head -1)
        echo "Postgres IP: $PG_IP  DB: $DB_NAME  User: $DB_USER"
        DB_URL="postgres://${DB_USER}:${DB_PASS}@${PG_IP}:5432/${DB_NAME}?sslmode=disable"

        COMPOSE_NETWORK=$(docker network ls \
          --filter "label=com.docker.compose.project" \
          --format "{{.Name}}" | head -1)
        echo "Compose network: $COMPOSE_NETWORK"

        # --lock-connection  → hides the login form, auto-connects with --url
        # --no-open          → don't try to open a browser on the server
        docker run -d \
          --name pgweb \
          --network "${COMPOSE_NETWORK:-host}" \
          -p 8081:8081 \
          sosedoff/pgweb \
          pgweb --bind=0.0.0.0 --listen=8081 \
                --url="$DB_URL" \
                --lock-connection \
                --no-open

        for i in {1..15}; do
          curl -sf http://localhost:8081 >/dev/null && echo "pgweb ready" && break
          sleep 2
        done

        cloudflared tunnel --url http://localhost:8081 > /tmp/pgweb-tunnel.log 2>&1 &
        for i in $(seq 1 30); do
          sleep 1
          PGWEB_URL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' /tmp/pgweb-tunnel.log | head -1)
          [ -n "$PGWEB_URL" ] && break
        done
        echo "PGWEB_URL=$PGWEB_URL" >> "$GITHUB_ENV"
        echo "================================="
        echo " Postgres UI (pgweb)"
        echo " URL:  $PGWEB_URL"
        echo " No login — direct DB access"
        echo "================================="

    - name: Start MinIO Console tunnel
      if: ${{ github.event.inputs.enable_minio_console == 'true' }}
      run: |
        cloudflared tunnel --url http://localhost:9001 > /tmp/minio-console-tunnel.log 2>&1 &
        for i in $(seq 1 30); do
          sleep 1
          MINIO_CONSOLE_URL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' /tmp/minio-console-tunnel.log | head -1)
          [ -n "$MINIO_CONSOLE_URL" ] && break
        done
        echo "MINIO_CONSOLE_URL=$MINIO_CONSOLE_URL" >> "$GITHUB_ENV"
        echo ""
        echo "┌─────────────────────────────────────────────┐"
        echo "│  MinIO Console                              │"
        echo "│  URL:      $MINIO_CONSOLE_URL"
        echo " User:     minioadmin  (MINIO_ROOT_USER)"
        echo " Password: minioadmin  (MINIO_ROOT_PASSWORD)"
        echo "================================="

    # ── Stream Celery logs inside keep-alive loop ─────────────────────────────
    # GHA does not show background process output across steps.
    # Solution: write all worker logs to a single file, then dump new lines
    # every 60s inside the keep-alive loop so they appear in GHA output.
    - name: Keep preview alive
      if: always()
      env:
        PREVIEW_DURATION: ${{ github.event.inputs.duration_hours || '2' }}
        SHOW_CELERY_LOGS: ${{ github.event.inputs.show_celery_logs }}
      run: |
        echo ""
        echo "================================="
        echo " SnapFind Preview is LIVE"
        echo "================================="
        echo " App:          $PREVIEW_URL"
        echo " API docs:     $PREVIEW_URL/api/docs"
        echo " MinIO tunnel: $MINIO_TUNNEL_URL"
        echo " Redis tunnel: $REDIS_TUNNEL_URL"
        echo " DB tunnel:    $DB_TUNNEL_URL"
        [ -n "$PGWEB_URL" ] && echo " pgweb DB UI:  $PGWEB_URL"
        echo "---------------------------------"
        echo " 🔑 Test Accounts"
        echo " Admin → admin@admin.com / 123456  (role: admin)"
        echo " User  → test@gmail.com  / 123456  (role: owner)"
        echo "================================="
        # Verify admin role was seeded correctly
        docker exec event_backend python3 -c "from app.database.db import SessionLocal; from app.models.user import User; db=SessionLocal(); u=db.query(User).filter(User.email=='admin@admin.com').first(); print('admin@admin.com role='+(u.role if u else 'NOT FOUND')); db.close()" 2>/dev/null || true

        # ── Start tailing all services into one log file ──────────────────────
        CELERY_LOG=/tmp/celery_all.log
        > "$CELERY_LOG"   # truncate/create

        tail_worker() {
          local CONTAINER="$1" LABEL="$2"
          docker logs -f --timestamps "$CONTAINER" 2>&1 \
            | sed -u "s/^/[$LABEL] /" >> "$CELERY_LOG" &
        }

        # Celery workers
        tail_worker event_celery_photo    "PHOTO   "
        tail_worker event_celery_finalize "FINALIZE"
        tail_worker event_celery_ai       "AI      "
        tail_worker event_celery_default  "DEFAULT "
        tail_worker event_celery_beat     "BEAT    "
        # Backend + Frontend
        tail_worker event_backend         "BACKEND "
        tail_worker event_frontend        "FRONTEND"

        echo "Log streaming started → $CELERY_LOG"
        echo "  Workers: photo | finalize | ai | default | beat | backend | frontend"
        LOG_OFFSET=0   # track how many lines we've already printed

        # ── Keep-alive loop ───────────────────────────────────────────────────
        SECONDS_LEFT=$(( PREVIEW_DURATION * 3600 ))
        for ((i=0; i<SECONDS_LEFT; i+=60)); do
          sleep 60
          REM=$(( (SECONDS_LEFT - i) / 60 ))
          echo ""
          echo "──────────────────────────────────────────"
          echo "[$REM min remaining] App: $PREVIEW_URL"
          echo "──────────────────────────────────────────"

          # Backend health check
          curl -sf http://localhost/api/docs >/dev/null \
            || echo "  ⚠ WARNING: backend health check failed"

          # Refresh pgweb tunnel URL if it has changed
          if [ -f /tmp/pgweb-tunnel.log ]; then
            LATEST_PGWEB=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' /tmp/pgweb-tunnel.log | tail -1)
            if [ -n "$LATEST_PGWEB" ] && [ "$LATEST_PGWEB" != "$PGWEB_URL" ]; then
              PGWEB_URL="$LATEST_PGWEB"
              echo "pgweb URL refreshed: $PGWEB_URL"
            fi
            [ -n "$PGWEB_URL" ] && echo " pgweb DB UI: $PGWEB_URL"
          fi

          # ── Dump new log lines since last iteration ────────────────────────
          if [ "${SHOW_CELERY_LOGS}" != "false" ]; then
            TOTAL_LINES=$(wc -l < "$CELERY_LOG")
            NEW_LINES=$(( TOTAL_LINES - LOG_OFFSET ))
            if [ "$NEW_LINES" -gt 0 ]; then
              echo "--- Service logs (last ${NEW_LINES} lines) ---"
              tail -n "$NEW_LINES" "$CELERY_LOG"
              echo "--- end ---"
            else
              echo "--- Service logs: no new output ---"
            fi
            LOG_OFFSET=$TOTAL_LINES
          fi

          # ── Container health summary every 5 min ───────────────────────────
          if (( i % 300 == 0 )); then
            echo "--- Container status ---"
            for C in event_backend event_frontend event_celery_photo event_celery_finalize event_celery_ai event_celery_default event_celery_beat; do
              STATUS=$(docker inspect --format='{{.State.Status}}' "$C" 2>/dev/null || echo "not found")
              echo "  $C → $STATUS"
            done
            echo "------------------------"
          fi
        done

    # 15 Show logs on failure
    - name: Show logs on failure
      if: failure()
      run: |
        echo "===== BACKEND ====="
        docker compose logs backend  --tail=50
        echo "===== FRONTEND ====="
        docker compose logs frontend --tail=50
        echo "===== NGINX ====="
        docker compose logs nginx    --tail=50
        echo "===== CELERY PHOTO ====="
        docker compose logs celery_photo    --tail=50
        echo "===== CELERY FINALIZE ====="
        docker compose logs celery_finalize --tail=50
        echo "===== CELERY AI ====="
        docker compose logs celery_ai       --tail=50
        echo "===== CELERY DEFAULT ====="
        docker compose logs celery_default  --tail=50
        echo "===== CELERY BEAT ====="
        docker compose logs celery_beat     --tail=50
        cat tunnel-app.log          || true
        cat tunnel-minio.log        || true
        cat /tmp/minio-console-tunnel.log || true
        cat /tmp/pgweb-tunnel.log   || true
        docker logs pgweb 2>/dev/null || true

    # 16 Cleanup
    - name: Cleanup
      if: always()
      run: |
        pkill cloudflared || true
        docker compose down -v
        echo "Cleanup complete"