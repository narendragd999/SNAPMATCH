name: Build Target - SnapFind Preview With Colab with GHA CPU

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration in hours"
        required: false
        default: "2"
      branch:
        description: "Branch to watch for changes"
        required: true
        default: "main"
      service_to_watch:
        description: "Service to rebuild on changes"
        required: true
        default: "frontend"
        type: choice
        options:
          - "frontend"
          - "backend"
      force_clean:
        description: "Force clean Docker build (prune cache)"
        required: false
        default: false
        type: boolean

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
    # 1 Checkout (Fetch depth 0 is required for git polling)
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event.inputs.branch }}

    # 2 Free disk space
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
        df -h

    - name: Force clean Docker cache
      if: ${{ github.event.inputs.force_clean == 'true' }}
      run: |
        docker system prune -af
        docker builder prune -af

    # 3 Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4 Setup Environment & .env
    - name: Write .env
      run: |
        cat > .env << 'EOF'
        SECRET_KEY=${{ secrets.SECRET_KEY || 'gha-preview-secret-key' }}
        ENV=prod
        STORAGE_BACKEND=minio
        MINIO_ENDPOINT=http://minio:9000
        MINIO_ACCESS_KEY=minioadmin
        MINIO_SECRET_KEY=minioadmin
        MINIO_BUCKET=snapfind
        MINIO_PUBLIC_URL=/storage
        NEXT_PUBLIC_API_URL=/api
        NEXT_PUBLIC_STORAGE_URL=/storage
        NGINX_PORT=80
        EOF

    # 5 Initial Build & Start
    - name: Build and Start Stack
      run: |
        # Initial build of all services
        docker compose build --parallel
        docker compose up -d
        
        # Wait for services
        sleep 10
        docker ps

    # 6 Tunnels (Cloudflared)
    - name: Install Cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

    - name: Start Tunnels
      run: |
        # Start App Tunnel
        cloudflared tunnel --url http://localhost:80 > tunnel.log 2>&1 &
        
        # Wait for URL
        sleep 10
        TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' tunnel.log | head -n 1)
        
        echo "PREVIEW_URL=$TUNNEL_URL" >> $GITHUB_ENV
        echo "================================="
        echo " LIVE URL: $TUNNEL_URL"
        echo "================================="

    # 7 THE AUTO-UPDATE LOOP (Option A Implementation)
    - name: Keep Alive & Watch for Changes
      env:
        WATCH_BRANCH: ${{ github.event.inputs.branch }}
        WATCH_SERVICE: ${{ github.event.inputs.service_to_watch }}
        DURATION: ${{ github.event.inputs.duration_hours }}
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        
        # Store current commit
        LAST_HASH=$(git rev-parse HEAD)
        SECONDS_LEFT=$(( DURATION * 3600 ))

        echo "👀 Watching branch '$WATCH_BRANCH' for changes to service '$WATCH_SERVICE'..."
        echo "Current Commit: $LAST_HASH"

        for ((i=0; i<SECONDS_LEFT; i+=60)); do
          sleep 60
          REMAINING=$(( (SECONDS_LEFT - i) / 60 ))
          echo "[$REMAINING min left] Checking for updates..."

          # 1. Fetch latest changes
          git fetch origin "$WATCH_BRANCH"
          REMOTE_HASH=$(git rev-parse "origin/$WATCH_BRANCH")

          # 2. Check if changes detected
          if [ "$LAST_HASH" != "$REMOTE_HASH" ]; then
            echo "🚀🚀🚀 NEW CHANGES DETECTED! 🚀🚀🚀"
            echo "Updating $LAST_HASH -> $REMOTE_HASH"

            # 3. Pull Code
            git reset --hard "origin/$WATCH_BRANCH"
            LAST_HASH=$REMOTE_HASH

            # 4. Rebuild ONLY the specific service
            echo "Rebuilding service: $WATCH_SERVICE"
            docker compose build "$WATCH_SERVICE"
            
            # 5. Restart container with zero downtime
            docker compose up -d "$WATCH_SERVICE"

            echo "✅ Hot Reload Complete!"
          else
            # Health Check
            curl -sf http://localhost:8000/docs >/dev/null && echo "Backend OK" || echo "Backend Fail"
          fi
        done