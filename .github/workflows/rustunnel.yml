name: SnapFind Preview

on:
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:

# ─────────────────────────────
# 1. Checkout
# ─────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

# ─────────────────────────────
# 2. Free disk
# ─────────────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          df -h

# ─────────────────────────────
# 3. Setup Docker
# ─────────────────────────────
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

# ─────────────────────────────
# 4. Install rustunnel
# ─────────────────────────────
      - name: Install rustunnel
        run: |
          echo "Installing rustunnel..."
          wget -qO rustunnel.tar.gz https://github.com/joaoh82/rustunnel/releases/download/v0.2.3/rustunnel-v0.2.3-x86_64-unknown-linux-musl.tar.gz
          tar -xzf rustunnel.tar.gz
          sudo mv rustunnel /usr/local/bin/
          chmod +x /usr/local/bin/rustunnel
          rustunnel --version

# ─────────────────────────────
# 5. Check token
# ─────────────────────────────
      - name: Verify RUSTUNNEL_TOKEN
        env:
          TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "❌ Missing RUSTUNNEL_TOKEN"
            exit 1
          fi
          echo "✅ Token found"

# ─────────────────────────────
# 6. Create rustunnel config
# ─────────────────────────────
      - name: Create config file
        env:
          TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
        run: |
          echo "server: edge.rustunnel.com:4040" > rt.yml
          echo "auth_token: $TOKEN" >> rt.yml
          echo "" >> rt.yml
          echo "tunnels:" >> rt.yml
          echo "  app:" >> rt.yml
          echo "    proto: http" >> rt.yml
          echo "    local_port: 80" >> rt.yml
          echo "    subdomain: snapfind-app" >> rt.yml

# ─────────────────────────────
# 7. Create ENV
# ─────────────────────────────
      - name: Create .env
        run: |
          echo "ENV=prod" > .env
          echo "SECRET_KEY=preview-secret" >> .env
          echo "MINIO_PUBLIC_URL=/storage" >> .env

# ─────────────────────────────
# 8. Start Docker
# ─────────────────────────────
      - name: Start containers
        run: |
          docker compose up -d --build
          docker ps

# ─────────────────────────────
# 9. Wait for app
# ─────────────────────────────
      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost > /dev/null; then
              echo "✅ App is ready"
              exit 0
            fi
            echo "Waiting..."
            sleep 3
          done
          echo "❌ App failed to start"
          docker compose logs
          exit 1

# ─────────────────────────────
# 10. Start tunnel
# ─────────────────────────────
      - name: Start rustunnel
        run: |
          rustunnel start --config rt.yml > tunnel.log 2>&1 &
          sleep 20

          URL=$(grep -oP 'http://[A-Za-z0-9.-]+\.edge\.rustunnel\.com' tunnel.log | head -1)

          if [ -z "$URL" ]; then
            echo "❌ Tunnel failed"
            cat tunnel.log
            exit 1
          fi

          echo "PREVIEW_URL=$URL" >> $GITHUB_ENV
          echo "🚀 Preview URL: $URL"

# ─────────────────────────────
# 11. Keep alive
# ─────────────────────────────
      - name: Keep alive
        run: |
          echo "App running at: $PREVIEW_URL"
          for i in {1..60}; do
            sleep 60
            echo "⏳ Running ($i min)"
          done

# ─────────────────────────────
# 12. Cleanup
# ─────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
          echo "🧹 Cleaned"