name: SnapFind Preview

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration in hours"
        required: false
        default: "2"
        type: choice
        options: ["1", "2", "3", "5"]

      force_clean:
        description: "Force clean Docker build"
        required: false
        default: false
        type: boolean

      enable_db_ui:
        description: "Enable pgweb UI"
        required: false
        default: false
        type: boolean

      enable_minio_console:
        description: "Enable MinIO Console"
        required: false
        default: false
        type: boolean

      show_celery_logs:
        description: "Show Celery logs"
        required: false
        default: true
        type: boolean

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:

# ─────────────────────────────────────────────
# 1. Checkout
# ─────────────────────────────────────────────
    - name: Checkout repo
      uses: actions/checkout@v4

# ─────────────────────────────────────────────
# 2. Free disk
# ─────────────────────────────────────────────
    - name: Free disk
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
        df -h

    - name: Clean Docker cache
      if: ${{ github.event.inputs.force_clean == 'true' }}
      run: |
        docker system prune -af
        docker builder prune -af

# ─────────────────────────────────────────────
# 3. Docker Buildx
# ─────────────────────────────────────────────
    - name: Setup Buildx
      uses: docker/setup-buildx-action@v3

# ─────────────────────────────────────────────
# 4. Install rustunnel
# ─────────────────────────────────────────────
    - name: Install rustunnel
      run: |
        VERSION=$(curl -sI https://github.com/joaoh82/rustunnel/releases/latest \
          | grep -i location | grep -oP 'v[\d.]+' | head -1)

        VERSION=${VERSION:-v0.2.3}

        wget -qO rt.tar.gz \
          "https://github.com/joaoh82/rustunnel/releases/download/${VERSION}/rustunnel-${VERSION}-x86_64-unknown-linux-musl.tar.gz"

        tar -xzf rt.tar.gz
        sudo install -Dm755 rustunnel /usr/local/bin/rustunnel

        rustunnel --version

# ─────────────────────────────────────────────
# 5. Verify token
# ─────────────────────────────────────────────
    - name: Check token
      env:
        TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
      run: |
        if [ -z "$TOKEN" ]; then
          echo "❌ Missing RUSTUNNEL_TOKEN"
          exit 1
        fi

# ─────────────────────────────────────────────
# 6. Create rustunnel config
# ─────────────────────────────────────────────
    - name: Create config
      env:
        TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
      run: |
        cat <<EOF > /tmp/rt.yml
server: edge.rustunnel.com:4040
auth_token: $TOKEN

tunnels:
  app:
    proto: http
    local_port: 80
    subdomain: snapfind-app

  redis:
    proto: tcp
    local_port: 6379

  postgres:
    proto: tcp
    local_port: 5432
EOF

# ─────────────────────────────────────────────
# 7. Create .env
# ─────────────────────────────────────────────
    - name: Create env
      run: |
        cat <<EOF > .env
ENV=prod
SECRET_KEY=gha-secret
STORAGE_BACKEND=minio
MINIO_ENDPOINT=http://minio:9000
MINIO_ACCESS_KEY=minioadmin
MINIO_SECRET_KEY=minioadmin
MINIO_BUCKET=snapfind
MINIO_PUBLIC_URL=/storage
MINIO_PRESIGN_ENDPOINT=
NEXT_PUBLIC_API_URL=/api
NEXT_PUBLIC_STORAGE_URL=/storage
NGINX_PORT=80
EOF

# ─────────────────────────────────────────────
# 8. Start Docker
# ─────────────────────────────────────────────
    - name: Start containers
      run: |
        docker compose build --parallel
        docker compose up -d

# ─────────────────────────────────────────────
# 9. Health checks
# ─────────────────────────────────────────────
    - name: Wait services
      run: |
        check() {
          for i in {1..40}; do
            curl -sf "$1" && return 0
            sleep 3
          done
          return 1
        }

        check http://localhost || exit 1
        check http://localhost:3000 || exit 1
        check http://localhost:8000/docs || exit 1

# ─────────────────────────────────────────────
# 10. Start tunnel
# ─────────────────────────────────────────────
    - name: Start tunnel
      run: |
        rustunnel start --config /tmp/rt.yml > rt.log 2>&1 &

        sleep 20

        APP_URL=$(grep -oP 'http://[A-Za-z0-9.-]+\.edge\.rustunnel\.com' rt.log | head -1)

        if [ -z "$APP_URL" ]; then
          echo "❌ Tunnel failed"
          cat rt.log
          exit 1
        fi

        echo "PREVIEW_URL=$APP_URL" >> $GITHUB_ENV

        echo "🚀 App URL: $APP_URL"

# ─────────────────────────────────────────────
# 11. Inject MinIO public URL
# ─────────────────────────────────────────────
    - name: Inject URLs
      run: |
        sed -i "s|MINIO_PRESIGN_ENDPOINT=.*|MINIO_PRESIGN_ENDPOINT=$PREVIEW_URL|" .env
        sed -i "s|MINIO_PUBLIC_URL=.*|MINIO_PUBLIC_URL=$PREVIEW_URL/storage|" .env

        docker compose up -d --force-recreate backend

# ─────────────────────────────────────────────
# 12. Keep alive
# ─────────────────────────────────────────────
    - name: Keep alive
      run: |
        echo "Preview running at: $PREVIEW_URL"

        for i in {1..120}; do
          sleep 60
          echo "⏳ Alive ($i min)"
        done

# ─────────────────────────────────────────────
# 13. Cleanup
# ─────────────────────────────────────────────
    - name: Cleanup
      if: always()
      run: |
        docker compose down -v
        echo "Done"