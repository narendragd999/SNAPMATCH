name: SnapFind Full Preview

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration"
        default: "2"
      enable_db_ui:
        description: "Enable pgweb"
        default: "false"
      enable_minio_console:
        description: "Enable MinIO Console"
        default: "false"

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

# ─────────────────────────────
# 1. Checkout
# ─────────────────────────────
      - uses: actions/checkout@v4

# ─────────────────────────────
# 2. Free space
# ─────────────────────────────
      - run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true

# ─────────────────────────────
# 3. Docker setup
# ─────────────────────────────
      - uses: docker/setup-buildx-action@v3

# ─────────────────────────────
# 4. Install rustunnel
# ─────────────────────────────
      - name: Install rustunnel
        run: |
          wget -qO rt.tar.gz https://github.com/joaoh82/rustunnel/releases/download/v0.2.3/rustunnel-v0.2.3-x86_64-unknown-linux-musl.tar.gz
          tar -xzf rt.tar.gz
          sudo mv rustunnel /usr/local/bin/
          chmod +x /usr/local/bin/rustunnel

# ─────────────────────────────
# 5. Verify token
# ─────────────────────────────
      - name: Check token
        env:
          TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "Missing token"; exit 1;
          fi

# ─────────────────────────────
# 6. Create rustunnel config
# ─────────────────────────────
      - name: Create tunnel config
        env:
          TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
        run: |
          echo "server: edge.rustunnel.com:4040" > rt.yml
          echo "auth_token: $TOKEN" >> rt.yml
          echo "" >> rt.yml
          echo "tunnels:" >> rt.yml
          echo "  app:" >> rt.yml
          echo "    proto: http" >> rt.yml
          echo "    local_port: 80" >> rt.yml
          echo "    subdomain: snapfind-app" >> rt.yml
          echo "  redis:" >> rt.yml
          echo "    proto: tcp" >> rt.yml
          echo "    local_port: 6379" >> rt.yml
          echo "  postgres:" >> rt.yml
          echo "    proto: tcp" >> rt.yml
          echo "    local_port: 5432" >> rt.yml

# ─────────────────────────────
# 7. Create ENV
# ─────────────────────────────
      - name: Create .env
        run: |
          echo "ENV=prod" > .env
          echo "SECRET_KEY=preview-secret" >> .env
          echo "MINIO_PUBLIC_URL=/storage" >> .env
          echo "MINIO_PRESIGN_ENDPOINT=" >> .env

# ─────────────────────────────
# 8. Start Docker
# ─────────────────────────────
      - name: Start containers
        run: |
          docker compose build --parallel
          docker compose up -d
          docker ps

# ─────────────────────────────
# 9. Wait for services
# ─────────────────────────────
      - name: Health check
        run: |
          for i in {1..40}; do
            curl -sf http://localhost && exit 0
            sleep 3
          done
          echo "App failed"; docker compose logs; exit 1

# ─────────────────────────────
# 10. Optional pgweb
# ─────────────────────────────
      - name: Start pgweb
        if: ${{ github.event.inputs.enable_db_ui == 'true' }}
        run: |
          docker run -d --name pgweb -p 8081:8081 \
            sosedoff/pgweb \
            --bind=0.0.0.0 --listen=8081 \
            --url="postgres://postgres:admin123@localhost:5432/postgres?sslmode=disable"

# ─────────────────────────────
# 11. Start tunnel
# ─────────────────────────────
      - name: Start rustunnel
        run: |
          rustunnel start --config rt.yml > tunnel.log 2>&1 &
          sleep 25

          APP_URL=$(grep -oP 'http://[A-Za-z0-9.-]+\.edge\.rustunnel\.com' tunnel.log | head -1)
          REDIS_PORT=$(grep -oP 'tcp://edge\.rustunnel\.com:\K[0-9]+' tunnel.log | sed -n '1p')
          PG_PORT=$(grep -oP 'tcp://edge\.rustunnel\.com:\K[0-9]+' tunnel.log | sed -n '2p')

          if [ -z "$APP_URL" ]; then
            echo "Tunnel failed"; cat tunnel.log; exit 1
          fi

          echo "PREVIEW_URL=$APP_URL" >> $GITHUB_ENV
          echo "REDIS_PORT=$REDIS_PORT" >> $GITHUB_ENV
          echo "PG_PORT=$PG_PORT" >> $GITHUB_ENV

          echo "🚀 App: $APP_URL"

# ─────────────────────────────
# 12. Inject MinIO URL
# ─────────────────────────────
      - name: Fix MinIO URLs (Nginx compatible)
        run: |
          echo "Setting MinIO endpoints for nginx routing..."

          # IMPORTANT: use nginx upload route
          sed -i "s|MINIO_PRESIGN_ENDPOINT=.*|MINIO_PRESIGN_ENDPOINT=$PREVIEW_URL/minio-upload|" .env

          # public read path
          sed -i "s|MINIO_PUBLIC_URL=.*|MINIO_PUBLIC_URL=$PREVIEW_URL/storage|" .env

          echo "Restarting backend..."
          docker compose up -d --force-recreate backend

          echo "Waiting for backend..."
          for i in {1..20}; do
            curl -sf http://localhost:8000/docs && break
            sleep 2
          done

          echo "🔍 Verifying inside container..."
          BACKEND=$(docker ps --format '{{.Names}}' | grep -i backend | head -1)

          docker exec $BACKEND printenv | grep MINIO


      - name: Debug presigned URL
        run: |
          echo "================ DEBUG PRESIGNED URL ================"

          echo "Checking backend health..."
          curl -s http://localhost:8000/docs > /dev/null && echo "✅ Backend OK" || echo "❌ Backend not reachable"

          echo ""
          echo "Trying to generate presigned URL..."

          RESPONSE=$(curl -s http://localhost:8000/api/test-presign || true)

          echo "Response:"
          echo "$RESPONSE"

          echo ""
          echo "Checking if URL contains correct domain..."

          echo "$RESPONSE" | grep -q "$PREVIEW_URL" \
            && echo "✅ Uses correct PUBLIC URL" \
            || echo "❌ STILL using localhost (PROBLEM)"

          echo "====================================================="

# ─────────────────────────────
# 13. Show URLs
# ─────────────────────────────
      - name: Show URLs
        run: |
          echo "========================="
          echo "APP: $PREVIEW_URL"
          echo "API: $PREVIEW_URL/api/docs"
          echo "Storage: $PREVIEW_URL/storage/"
          echo "Redis: edge.rustunnel.com:$REDIS_PORT"
          echo "Postgres: edge.rustunnel.com:$PG_PORT"
          echo "========================="

# ─────────────────────────────
# 14. Keep alive
# ─────────────────────────────
      - name: Keep alive
        run: |
          for i in {1..120}; do
            sleep 60
            echo "Running $i min"
          done

# ─────────────────────────────
# 15. Cleanup
# ─────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          docker compose down -v