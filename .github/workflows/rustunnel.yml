name: SnapFind Hybrid Preview

on:
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

# ─────────────────────────────
# 1. Checkout
# ─────────────────────────────
      - uses: actions/checkout@v4

# ─────────────────────────────
# 2. Free disk
# ─────────────────────────────
      - name: Free disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true

# ─────────────────────────────
# 3. Setup Docker
# ─────────────────────────────
      - uses: docker/setup-buildx-action@v3

# ─────────────────────────────
# 4. Install rustunnel
# ─────────────────────────────
      - name: Install rustunnel
        run: |
          wget -qO rt.tar.gz https://github.com/joaoh82/rustunnel/releases/download/v0.2.3/rustunnel-v0.2.3-x86_64-unknown-linux-musl.tar.gz
          tar -xzf rt.tar.gz
          sudo mv rustunnel /usr/local/bin/
          chmod +x /usr/local/bin/rustunnel

# ─────────────────────────────
# 5. Install cloudflared
# ─────────────────────────────
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

# ─────────────────────────────
# 6. Verify token
# ─────────────────────────────
      - name: Check rustunnel token
        env:
          TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "Missing RUSTUNNEL_TOKEN"
            exit 1
          fi

# ─────────────────────────────
# 7. Create rustunnel config
# ─────────────────────────────
      - name: Create tunnel config
        env:
          TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
        run: |
          cat <<EOF > rt.yml
server: edge.rustunnel.com:4040
auth_token: $TOKEN

tunnels:
  app:
    proto: http
    local_port: 80
    subdomain: snapfind-app
EOF

# ─────────────────────────────
# 8. Create ENV
# ─────────────────────────────
      - name: Create .env
        run: |
          cat <<EOF > .env
          ENV=prod
          SECRET_KEY=preview-secret
          STORAGE_BACKEND=minio
          MINIO_ENDPOINT=http://minio:9000
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin
          MINIO_BUCKET=snapfind
          MINIO_PUBLIC_URL=/storage
          MINIO_PRESIGN_ENDPOINT=
          NEXT_PUBLIC_API_URL=/api
          NEXT_PUBLIC_STORAGE_URL=/storage
          NGINX_PORT=80
          EOF

# ─────────────────────────────
# 9. Start Docker
# ─────────────────────────────
      - name: Start containers
        run: |
          docker compose build --parallel
          docker compose up -d

# ─────────────────────────────
# 10. Wait services
# ─────────────────────────────
      - name: Wait for services
        run: |
          for i in {1..40}; do
            curl -sf http://localhost && exit 0
            sleep 3
          done
          echo "App failed"; docker compose logs; exit 1

# ─────────────────────────────
# 11. Start rustunnel (APP)
# ─────────────────────────────
      - name: Start app tunnel
        run: |
          rustunnel start --config rt.yml > rt.log 2>&1 &
          sleep 20

          APP_URL=$(grep -oP 'http://[A-Za-z0-9.-]+\.edge\.rustunnel\.com' rt.log | head -1)

          if [ -z "$APP_URL" ]; then
            echo "Tunnel failed"; cat rt.log; exit 1
          fi

          echo "PREVIEW_URL=$APP_URL" >> $GITHUB_ENV
          echo "APP URL: $APP_URL"

# ─────────────────────────────
# 12. Start MinIO tunnel (DIRECT)
# ─────────────────────────────
      - name: Start MinIO tunnel
        run: |
          cloudflared tunnel --url http://localhost:9000 > /tmp/minio.log 2>&1 &

          for i in {1..30}; do
            sleep 1
            MINIO_URL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' /tmp/minio.log | head -1)
            [ -n "$MINIO_URL" ] && break
          done

          if [ -z "$MINIO_URL" ]; then
            echo "MinIO tunnel failed"; cat /tmp/minio.log; exit 1
          fi

          echo "MINIO_TUNNEL_URL=$MINIO_URL" >> $GITHUB_ENV
          echo "MinIO URL: $MINIO_URL"

# ─────────────────────────────
# 13. Make bucket public
# ─────────────────────────────
      - name: Make MinIO bucket public
        run: |
          MC=$(docker ps --format '{{.Names}}' | grep -i minio | head -1)

          docker exec $MC mc alias set local http://localhost:9000 minioadmin minioadmin || true
          docker exec $MC mc anonymous set public local/snapfind || true

# ─────────────────────────────
# 14. Inject endpoints (HYBRID)
# ─────────────────────────────
      - name: Inject MinIO endpoints
        run: |
          sed -i "s|MINIO_PRESIGN_ENDPOINT=.*|MINIO_PRESIGN_ENDPOINT=$MINIO_TUNNEL_URL|" .env
          sed -i "s|MINIO_PUBLIC_URL=.*|MINIO_PUBLIC_URL=$PREVIEW_URL/storage|" .env

          docker compose up -d --force-recreate backend

          for i in {1..20}; do
            curl -sf http://localhost:8000/docs && break
            sleep 2
          done

# ─────────────────────────────
# 15. Show URLs
# ─────────────────────────────
      - name: Show URLs
        run: |
          echo "================================="
          echo "APP: $PREVIEW_URL"
          echo "UPLOAD: $MINIO_TUNNEL_URL"
          echo "STORAGE: $PREVIEW_URL/storage/"
          echo "================================="

# ─────────────────────────────
# 16. Keep alive
# ─────────────────────────────
      - name: Keep alive
        run: |
          for i in {1..120}; do
            sleep 60
            echo "Running $i min"
          done

# ─────────────────────────────
# 17. Cleanup
# ─────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          pkill cloudflared || true
          docker compose down -v