name: SnapFind Preview (Clean Stable)

on:
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - uses: actions/checkout@v4

      # ── Install rustunnel ──
      - name: Install rustunnel
        run: |
          wget -qO rt.tgz https://github.com/joaoh82/rustunnel/releases/latest/download/rustunnel-v0.2.3-x86_64-unknown-linux-musl.tar.gz
          tar -xzf rt.tgz
          sudo mv rustunnel /usr/local/bin/

      # ── Config (single HTTP tunnel) ──
      - name: Write config
        env:
          TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
        run: |
          [ -z "$TOKEN" ] && echo "Missing RUSTUNNEL_TOKEN" && exit 1

          cat > rt.yml <<EOF
          server: edge.rustunnel.com:4040
          auth_token: $TOKEN

          tunnels:
            app: { proto: http, local_port: 80 }
            redis: { proto: tcp, local_port: 6379 }
            postgres: { proto: tcp, local_port: 5432 }
          EOF

      # ── Start Docker ──
      - name: Start services
        run: |
          docker compose up -d --build
          docker ps

      # ── Wait for app ──
      - name: Health check
        run: |
          for i in {1..40}; do
            curl -sf http://localhost && echo "App ready" && break
            sleep 3
          done

      # ── Start tunnel ──
      - name: Start rustunnel
        run: |
          rustunnel start --config rt.yml > rt.log 2>&1 &
          echo $! > rt.pid

          echo "Waiting for tunnel..."

          for i in {1..20}; do
            sleep 5
            URL=$(grep -oP 'http://\S+\.edge\.rustunnel\.com' rt.log | head -1)
            if [ -n "$URL" ]; then
              echo "PREVIEW_URL=$URL" >> $GITHUB_ENV
              break
            fi
          done

          echo "===== rustunnel log ====="
          cat rt.log

      # ── Extract TCP ──
      - name: Extract ports
        run: |
          REDIS=$(grep -B1 '6379' rt.log | grep -oP ':\K[0-9]+' | head -1)
          PG=$(grep -B1 '5432' rt.log | grep -oP ':\K[0-9]+' | head -1)

          echo "REDIS_PORT=$REDIS" >> $GITHUB_ENV
          echo "PG_PORT=$PG" >> $GITHUB_ENV

      # ── Show output ──
      - name: Preview info
        run: |
          echo "=============================="
          echo "🚀 SNAPFIND LIVE"
          echo "=============================="
          echo "App:      $PREVIEW_URL"
          echo "API:      $PREVIEW_URL/api/docs"
          echo "Storage:  $PREVIEW_URL/storage"
          echo "------------------------------"
          echo "Redis:    edge.rustunnel.com:$REDIS_PORT"
          echo "Postgres: edge.rustunnel.com:$PG_PORT"
          echo "=============================="

      # ── Live logs (Celery + backend) ──
      - name: Stream logs
        run: |
          tail_logs() {
            docker logs -f --timestamps $1 2>&1 | sed "s/^/[$1] /" &
          }

          tail_logs event_backend
          tail_logs event_frontend
          tail_logs event_celery_photo
          tail_logs event_celery_ai
          tail_logs event_celery_default

          tail -f rt.log | sed 's/^/[RUSTUNNEL] /' &

          sleep 7200

      # ── Cleanup ──
      - name: Cleanup
        if: always()
        run: |
          kill $(cat rt.pid) 2>/dev/null || true
          docker compose down -v