name: SnapFind Preview (Rustunnel Full)

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration (hours)"
        default: "2"

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

# ─────────────────────────────
# 1. Checkout
# ─────────────────────────────
      - uses: actions/checkout@v4

# ─────────────────────────────
# 2. Free disk
# ─────────────────────────────
      - name: Free disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          df -h

# ─────────────────────────────
# 3. Setup Docker
# ─────────────────────────────
      - uses: docker/setup-buildx-action@v3

# ─────────────────────────────
# 4. Install rustunnel
# ─────────────────────────────
      - name: Install rustunnel
        run: |
          VERSION=v0.2.3
          wget -qO rt.tar.gz https://github.com/joaoh82/rustunnel/releases/download/${VERSION}/rustunnel-${VERSION}-x86_64-unknown-linux-musl.tar.gz
          tar -xzf rt.tar.gz
          sudo mv rustunnel /usr/local/bin/
          chmod +x /usr/local/bin/rustunnel
          rustunnel --version

# ─────────────────────────────
# 5. Verify token
# ─────────────────────────────
      - name: Verify token
        env:
          TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "❌ Missing RUSTUNNEL_TOKEN"
            exit 1
          fi

# ─────────────────────────────
# 6. Create rustunnel config
# ─────────────────────────────
      - name: Create tunnel config
        env:
          TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
        run: |
          cat <<EOF > rt.yml
          server: edge.rustunnel.com:4040
          auth_token: $TOKEN

          tunnels:
            app:
              proto: http
              local_port: 80
              subdomain: snapfind-app

            redis:
              proto: tcp
              local_port: 6379

            postgres:
              proto: tcp
              local_port: 5432
          EOF

# ─────────────────────────────
# 7. Create ENV
# ─────────────────────────────
      - name: Create .env
        run: |
          cat <<EOF > .env
          ENV=prod
          SECRET_KEY=preview-secret

          STORAGE_BACKEND=minio
          MINIO_ENDPOINT=http://minio:9000
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin
          MINIO_BUCKET=snapfind
          MINIO_PUBLIC_URL=/storage
          MINIO_PRESIGN_ENDPOINT=

          NEXT_PUBLIC_API_URL=/api
          NEXT_PUBLIC_STORAGE_URL=/storage
          NGINX_PORT=80
          EOF

# ─────────────────────────────
# 8. Start Docker
# ─────────────────────────────
      - name: Start containers
        run: |
          docker compose build --parallel
          docker compose up -d
          docker ps

# ─────────────────────────────
# 9. Wait for services
# ─────────────────────────────
      - name: Wait for services
        run: |
          for i in {1..40}; do
            curl -sf http://localhost && echo "App ready" && exit 0
            sleep 3
          done
          echo "❌ App failed"
          docker compose logs
          exit 1

# ─────────────────────────────
# 10. Start rustunnel
# ─────────────────────────────
      - name: Start rustunnel
        run: |
          rustunnel start --config rt.yml > tunnel.log 2>&1 &
          echo $! > rt.pid

          sleep 25

          echo "---- rustunnel log ----"
          cat tunnel.log

          APP_URL=$(grep -oP 'http://[A-Za-z0-9.-]+\.edge\.rustunnel\.com' tunnel.log | head -1)
          REDIS_PORT=$(grep -oP 'tcp://edge\.rustunnel\.com:\K[0-9]+' tunnel.log | sed -n '1p')
          PG_PORT=$(grep -oP 'tcp://edge\.rustunnel\.com:\K[0-9]+' tunnel.log | sed -n '2p')

          if [ -z "$APP_URL" ]; then
            echo "❌ Tunnel failed"
            exit 1
          fi

          echo "PREVIEW_URL=$APP_URL" >> $GITHUB_ENV
          echo "REDIS_PORT=$REDIS_PORT" >> $GITHUB_ENV
          echo "PG_PORT=$PG_PORT" >> $GITHUB_ENV

          echo "================================="
          echo "APP: $APP_URL"
          echo "REDIS: edge.rustunnel.com:$REDIS_PORT"
          echo "POSTGRES: edge.rustunnel.com:$PG_PORT"
          echo "================================="

# ─────────────────────────────
# 11. Fix MinIO URLs
# ─────────────────────────────
      - name: Configure MinIO endpoints
        run: |
          sed -i "s|MINIO_PRESIGN_ENDPOINT=.*|MINIO_PRESIGN_ENDPOINT=$PREVIEW_URL|" .env
          sed -i "s|MINIO_PUBLIC_URL=.*|MINIO_PUBLIC_URL=$PREVIEW_URL/storage|" .env

          docker compose up -d --force-recreate backend

          for i in {1..20}; do
            curl -sf http://localhost:8000/docs && break
            sleep 2
          done

# ─────────────────────────────
# 12. Make MinIO bucket public
# ─────────────────────────────
      - name: Make MinIO bucket public
        run: |
          MC=$(docker ps --format '{{.Names}}' | grep -i minio | head -1)

          docker exec $MC mc alias set local http://localhost:9000 minioadmin minioadmin || true
          docker exec $MC mc anonymous set public local/snapfind || true

# ─────────────────────────────
# 13. Show URLs
# ─────────────────────────────
      - name: Show URLs
        run: |
          echo "================================="
          echo "APP URL:"
          echo "$PREVIEW_URL"
          echo ""
          echo "API:"
          echo "$PREVIEW_URL/api/docs"
          echo ""
          echo "STORAGE:"
          echo "$PREVIEW_URL/storage/"
          echo ""
          echo "PGWEB:"
          echo "$PREVIEW_URL/pgweb/"
          echo ""
          echo "MINIO CONSOLE:"
          echo "$PREVIEW_URL/minio-console/"
          echo ""
          echo "REDIS:"
          echo "edge.rustunnel.com:$REDIS_PORT"
          echo ""
          echo "POSTGRES:"
          echo "edge.rustunnel.com:$PG_PORT"
          echo "================================="

# ─────────────────────────────
# 14. Keep alive
# ─────────────────────────────
      - name: Keep alive
        run: |
          HOURS=${{ github.event.inputs.duration_hours }}
          SECONDS=$((HOURS * 3600))

          for ((i=0; i<$SECONDS; i+=60)); do
            sleep 60
            echo "Running... $((i/60)) min"
          done

# ─────────────────────────────
# 15. Cleanup
# ─────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          kill $(cat rt.pid) 2>/dev/null || true
          docker compose down -v
          echo "Cleanup complete"