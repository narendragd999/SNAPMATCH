name: SnapFind Preview (Rustunnel Final)

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration in hours"
        default: "2"

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:

# ─────────────────────────────
# 1. Checkout
# ─────────────────────────────
    - uses: actions/checkout@v4

# ─────────────────────────────
# 2. Free disk
# ─────────────────────────────
    - run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true

# ─────────────────────────────
# 3. Setup Docker
# ─────────────────────────────
    - uses: docker/setup-buildx-action@v3

# ─────────────────────────────
# 4. Install rustunnel
# ─────────────────────────────
    - name: Install rustunnel
      run: |
        wget -qO rt.tar.gz https://github.com/joaoh82/rustunnel/releases/download/v0.2.3/rustunnel-v0.2.3-x86_64-unknown-linux-musl.tar.gz
        tar -xzf rt.tar.gz
        sudo mv rustunnel /usr/local/bin/
        chmod +x /usr/local/bin/rustunnel
        rustunnel --version

# ─────────────────────────────
# 5. Create ENV
# ─────────────────────────────
    - name: Create .env
      run: |
        cat <<EOF > .env
        ENV=prod
        SECRET_KEY=gha-preview-secret-key

        STORAGE_BACKEND=minio
        MINIO_ENDPOINT=http://minio:9000
        MINIO_ACCESS_KEY=minioadmin
        MINIO_SECRET_KEY=minioadmin
        MINIO_BUCKET=snapfind
        MINIO_PUBLIC_URL=/storage
        MINIO_PRESIGN_ENDPOINT=

        NEXT_PUBLIC_API_URL=/api
        NEXT_PUBLIC_STORAGE_URL=/storage
        NGINX_PORT=80
        EOF

# ─────────────────────────────
# 6. Start Docker
# ─────────────────────────────
    - name: Start containers
      run: |
        docker compose build --parallel
        docker compose up -d
        docker ps

# ─────────────────────────────
# 7. Wait for services
# ─────────────────────────────
    - name: Wait services
      run: |
        for i in {1..40}; do
          curl -sf http://localhost && echo "Ready" && exit 0
          sleep 3
        done
        docker compose logs
        exit 1

# ─────────────────────────────
# 8. Create rustunnel config
# ─────────────────────────────
    - name: Create rustunnel config
      env:
        TOKEN: ${{ secrets.RUSTUNNEL_TOKEN }}
      run: |
        cat <<EOF > rt.yml
        server: edge.rustunnel.com:4040
        auth_token: $TOKEN

        tunnels:
          app:
            proto: http
            local_port: 80
            subdomain: snapfind-app

          pgweb:
            proto: http
            local_port: 8081
            subdomain: snapfind-pgweb

          minio_console:
            proto: http
            local_port: 9001
            subdomain: snapfind-minio

          redis:
            proto: tcp
            local_port: 6379

          postgres:
            proto: tcp
            local_port: 5432
        EOF

# ─────────────────────────────
# 9. Start rustunnel
# ─────────────────────────────
    - name: Start rustunnel (FINAL FIX)
      run: |
        rustunnel start --config rt.yml > tunnel.log 2>&1 &
        sleep 25

        echo "==== LOG ===="
        cat tunnel.log

        # APP is fixed (subdomain)
        APP_URL="http://snapfind-app.edge.rustunnel.com"

        # Extract OTHER HTTP URLs
        OTHERS=($(grep -oP 'http://[A-Za-z0-9.-]+\.edge\.rustunnel\.com' tunnel.log | grep -v snapfind-app))

        PGWEB_URL=${OTHERS[0]}
        MINIO_UI=${OTHERS[1]}

        # TCP
        TCP_PORTS=($(grep -oP 'tcp://edge\.rustunnel\.com:\K[0-9]+' tunnel.log))

        REDIS_PORT=${TCP_PORTS[0]}
        DB_PORT=${TCP_PORTS[1]}

        echo "PREVIEW_URL=$APP_URL" >> $GITHUB_ENV
        echo "PGWEB_URL=$PGWEB_URL" >> $GITHUB_ENV
        echo "MINIO_UI=$MINIO_UI" >> $GITHUB_ENV
        echo "REDIS_PORT=$REDIS_PORT" >> $GITHUB_ENV
        echo "DB_PORT=$DB_PORT" >> $GITHUB_ENV

# ─────────────────────────────
# 10. Fix HTTPS (NO mixed content)
# ─────────────────────────────
    - name: Fix MinIO URLs
      run: |
        CLEAN=$(echo $PREVIEW_URL | sed 's|http://||')

        sed -i "s|MINIO_PRESIGN_ENDPOINT=.*|MINIO_PRESIGN_ENDPOINT=https://$CLEAN|" .env
        sed -i "s|MINIO_PUBLIC_URL=.*|MINIO_PUBLIC_URL=https://$CLEAN/storage|" .env

        docker compose up -d --force-recreate backend

# ─────────────────────────────
# 11. Make bucket public
# ─────────────────────────────
    - name: Make bucket public
      run: |
        MC=$(docker ps --format '{{.Names}}' | grep -i minio | head -1)

        docker exec $MC mc alias set local http://localhost:9000 minioadmin minioadmin || true
        docker exec $MC mc anonymous set public local/snapfind || true

# ─────────────────────────────
# 12. Show URLs
# ─────────────────────────────
    - name: Show URLs
      run: |
        CLEAN=$(echo $PREVIEW_URL | sed 's|http://||')

        echo "================================="
        echo "APP:"
        echo "https://$CLEAN"
        echo ""
        echo "API:"
        echo "https://$CLEAN/api/docs"
        echo ""
        echo "STORAGE:"
        echo "https://$CLEAN/storage/"
        echo ""
        echo "PGWEB:"
        echo "$PGWEB_URL"
        echo ""
        echo "MINIO CONSOLE:"
        echo "$MINIO_UI"
        echo ""
        echo "REDIS:"
        echo "edge.rustunnel.com:$REDIS_PORT"
        echo ""
        echo "POSTGRES:"
        echo "edge.rustunnel.com:$DB_PORT"
        echo "================================="

# ─────────────────────────────
# 13. Keep alive
# ─────────────────────────────
    - name: Keep alive
      run: |
        HOURS=${{ github.event.inputs.duration_hours }}
        SECONDS=$((HOURS * 3600))

        for ((i=0; i<$SECONDS; i+=60)); do
          sleep 60
          echo "Running $((i/60)) min"
        done

# ─────────────────────────────
# 14. Cleanup
# ─────────────────────────────
    - name: Cleanup
      if: always()
      run: |
        docker compose down -v