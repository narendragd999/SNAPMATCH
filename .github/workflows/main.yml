name: SnapFind Preview

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration in hours"
        required: false
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "5"

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:

    # ───────────────────────────────
    # 1. Checkout repository
    # ───────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v4


    # ───────────────────────────────
    # 2. Show runner system info
    # ───────────────────────────────
    - name: System info
      run: |
        echo "CPU:"
        nproc
        echo "RAM:"
        free -h
        echo "Disk:"
        df -h


    # ───────────────────────────────
    # 3. Free disk space
    # ───────────────────────────────
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /opt/ghc || true
        docker system prune -af || true
        df -h


    # ───────────────────────────────
    # 4. Start Docker stack
    # ───────────────────────────────
    - name: Start containers
      run: |
        docker compose -f docker-compose.yml up -d --build
        docker ps


    # ───────────────────────────────
    # 5. Wait for backend API
    # ───────────────────────────────
    - name: Wait for backend
      run: |
        echo "Waiting for backend API..."
        for i in {1..30}; do
          if curl -sf http://localhost:8000/docs >/dev/null; then
            echo "Backend ready"
            exit 0
          fi
          echo "Still starting..."
          sleep 5
        done

        echo "Backend failed to start"
        docker compose -f docker-compose.test.yml logs
        exit 1


    # ───────────────────────────────
    # 6. Install cloudflared
    # ───────────────────────────────
    - name: Install Cloudflare Tunnel
      run: |
        CLOUDFLARED_VERSION="2024.11.0"
        wget -q https://github.com/cloudflare/cloudflared/releases/download/${CLOUDFLARED_VERSION}/cloudflared-linux-amd64 -O cloudflared
        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/cloudflared
        cloudflared --version


    # ───────────────────────────────
    # 7. Start Cloudflare tunnel
    # ───────────────────────────────
    - name: Start Cloudflare Tunnel
      env:
        TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
      run: |
        echo "Starting Cloudflare tunnel..."

        cloudflared tunnel --no-autoupdate run \
          --token "$TUNNEL_TOKEN" \
          > tunnel.log 2>&1 &

        sleep 10

        echo "Tunnel log:"
        cat tunnel.log || true


    # ───────────────────────────────
    # 8. Keep preview alive
    # ───────────────────────────────
    - name: Keep preview alive
      env:
        PREVIEW_DURATION: ${{ github.event.inputs.duration_hours || '2' }}
      run: |
        SECONDS=$(( PREVIEW_DURATION * 3600 ))

        echo ""
        echo "================================="
        echo "SnapFind Preview is LIVE"
        echo "Duration: $PREVIEW_DURATION hour(s)"
        echo "================================="
        echo ""

        for ((i=0;i<$SECONDS;i+=60)); do
          sleep 60
          REM=$(( (SECONDS-i)/60 ))
          echo "Preview running... $REM minutes remaining"

          if ! curl -sf http://localhost:8000/docs >/dev/null; then
            echo "Warning: backend not responding"
          fi
        done


    # ───────────────────────────────
    # 9. Show logs if failure
    # ───────────────────────────────
    - name: Show logs on failure
      if: failure()
      run: |
        docker compose -f docker-compose.test.yml logs --tail=50
        cat tunnel.log || true


    # ───────────────────────────────
    # 10. Cleanup
    # ───────────────────────────────
    - name: Cleanup
      if: always()
      run: |
        pkill cloudflared || true
        docker compose -f docker-compose.test.yml down -v
        echo "Cleanup complete"
