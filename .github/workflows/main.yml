name: SnapFind Test

on:
  workflow_dispatch:

jobs:
  test-stack:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start Docker stack
        run: docker compose up -d

      - name: Wait for services
        run: sleep 30

      - name: Show containers
        run: docker ps

      - name: Show logs
        run: docker compose logs
