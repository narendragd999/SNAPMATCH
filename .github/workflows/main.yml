name: SnapFind Preview

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration in hours"
        required: false
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "5"

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:

    # 1. Checkout
    - name: Checkout code
      uses: actions/checkout@v4


    # 2. System info
    - name: System info
      run: |
        echo "CPU:"
        nproc
        echo "RAM:"
        free -h
        echo "Disk:"
        df -h


    # 3. Free disk
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /opt/ghc || true
        docker system prune -af || true
        df -h


    # 4. Start Docker stack
    - name: Start containers
      run: |
        docker compose -f docker-compose.yml up -d --build
        docker ps


    # 5. Wait for backend
    - name: Wait for backend
      run: |
        echo "Waiting for backend..."
        for i in {1..30}; do
          if curl -sf http://localhost:8000/docs >/dev/null; then
            echo "Backend ready"
            exit 0
          fi
          sleep 5
        done

        echo "Backend failed"
        docker compose logs
        exit 1


    # 6. Wait for frontend
    - name: Wait for frontend
      run: |
        echo "Waiting for frontend..."
        for i in {1..30}; do
          if curl -sf http://localhost:3000 >/dev/null; then
            echo "Frontend ready"
            exit 0
          fi
          sleep 5
        done

        echo "Frontend failed"
        docker compose logs
        exit 1


    # 7. Install cloudflared
    - name: Install Cloudflare
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        cloudflared --version


    # 8. Start backend tunnel
    - name: Start Backend Tunnel
      run: |
        echo "Starting backend tunnel..."

        cloudflared tunnel --url http://localhost:8000 \
          > backend_tunnel.log 2>&1 &

        sleep 8

        BACKEND_URL=$(grep -o 'https://.*trycloudflare.com' backend_tunnel.log | head -n 1)

        echo "Backend URL:"
        echo "$BACKEND_URL"

        echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV


    # 9. Start frontend tunnel
    - name: Start Frontend Tunnel
      run: |
        echo "Starting frontend tunnel..."

        cloudflared tunnel --url http://localhost:3000 \
          > frontend_tunnel.log 2>&1 &

        sleep 8

        FRONTEND_URL=$(grep -o 'https://.*trycloudflare.com' frontend_tunnel.log | head -n 1)

        echo "Frontend URL:"
        echo "$FRONTEND_URL"

        echo "FRONTEND_URL=$FRONTEND_URL" >> $GITHUB_ENV


    # 10. Print preview URLs
    - name: Show preview links
      run: |
        echo ""
        echo "================================="
        echo " SnapFind Preview is LIVE"
        echo "================================="
        echo ""
        echo "Frontend:"
        echo "$FRONTEND_URL"
        echo ""
        echo "Backend API:"
        echo "$BACKEND_URL/docs"
        echo ""


    # 11. Keep preview alive
    - name: Keep preview alive
      env:
        PREVIEW_DURATION: ${{ github.event.inputs.duration_hours || '2' }}
      run: |
        SECONDS=$(( PREVIEW_DURATION * 3600 ))

        for ((i=0;i<$SECONDS;i+=60)); do
          sleep 60
          REM=$(( (SECONDS-i)/60 ))
          echo "Preview running... $REM minutes remaining"
        done


    # 12. Cleanup
    - name: Cleanup
      if: always()
      run: |
        pkill cloudflared || true
        docker compose down -v
        echo "Cleanup complete"
