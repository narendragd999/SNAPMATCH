name: Run Project Server

on:
  workflow_dispatch:

jobs:
  run-project:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Show system specs
      run: |
        echo "CPU:"
        nproc
        echo "Memory:"
        free -h
        echo "Disk:"
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip docker.io

    - name: Run project
      run: |
        python3 main.py
