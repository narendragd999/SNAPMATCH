name: SnapFind Preview With Colab

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Preview duration in hours"
        required: false
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "5"
      force_clean:
        description: "Force clean Docker build (prune cache + rebuild from scratch)"
        required: false
        default: false
        type: boolean
      enable_db_ui:
        description: "Expose Postgres via pgweb browser UI (adds ~30s startup)"
        required: false
        default: false
        type: boolean
      enable_minio_console:
        description: "Expose MinIO Console web UI on a public tunnel URL"
        required: false
        default: false
        type: boolean
      show_celery_logs:
        description: "Stream live Celery worker logs in the GHA output"
        required: false
        default: true
        type: boolean

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:

    # 1 Checkout
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2 Free disk space
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
        df -h

    # 2.5 Force clean
    - name: Force clean Docker cache (only when requested)
      if: ${{ github.event.inputs.force_clean == 'true' }}
      run: |
        echo "force_clean=true — pruning all Docker layers and build cache"
        docker system prune -af
        docker builder prune -af
        df -h
        echo "Clean done — this run will rebuild all images from scratch"

    # 3 Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4 Cache pip packages
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-flask-redis-psycopg2
        restore-keys: |
          ${{ runner.os }}-pip-

    # 5 Install Python proxy dependencies early
    - name: Install proxy dependencies
      run: pip install flask redis psycopg2-binary -q

    # 6 Patch docker-compose.yml — set celery_photo restart to "no"
    # This ensures docker stop event_celery_photo stays stopped permanently
    - name: Patch celery_photo restart policy
      run: |
        # Change celery_photo restart: unless-stopped → restart: "no"
        python3 << 'PYEOF'
        import re

        with open("docker-compose.yml", "r") as f:
            content = f.read()

        # Find celery_photo service block and change its restart policy
        # We do this carefully to only change celery_photo, not other services
        lines = content.split("\n")
        in_celery_photo = False
        result = []
        for i, line in enumerate(lines):
            if line.strip().startswith("celery_photo:") and not line.startswith(" " * 6):
                in_celery_photo = True
            elif in_celery_photo and re.match(r'^  \w', line) and not line.startswith("  celery_photo:"):
                in_celery_photo = False

            if in_celery_photo and "restart: unless-stopped" in line:
                line = line.replace("restart: unless-stopped", 'restart: "no"')
                print(f"✅ Patched celery_photo restart policy at line {i+1}")

            result.append(line)

        with open("docker-compose.yml", "w") as f:
            f.write("\n".join(result))

        print("docker-compose.yml patched successfully")
        PYEOF

        # Verify patch
        echo "=== celery_photo restart policy ==="
        grep -A 50 "celery_photo:" docker-compose.yml | grep -m1 "restart:"

    # 7 Write GHA .env
    - name: Write GHA .env
      run: |
        cat > .env << 'EOF'
        SECRET_KEY=${{ secrets.SECRET_KEY || 'gha-preview-secret-key' }}
        ENV=prod

        # Storage
        STORAGE_BACKEND=minio
        MINIO_ENDPOINT=http://minio:9000
        MINIO_ACCESS_KEY=minioadmin
        MINIO_SECRET_KEY=minioadmin
        MINIO_BUCKET=snapfind
        MINIO_PUBLIC_URL=/storage
        MINIO_PRESIGN_ENDPOINT=

        # Payments
        RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
        RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}

        # SMTP
        SMTP_HOST=${{ secrets.SMTP_HOST || '' }}
        SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
        SMTP_USER=${{ secrets.SMTP_USER || '' }}
        SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD || '' }}
        SMTP_FROM=${{ secrets.SMTP_FROM || '' }}

        # Frontend
        NEXT_PUBLIC_API_URL=/api
        NEXT_PUBLIC_STORAGE_URL=/storage
        NGINX_PORT=80

        # AI models
        MAX_PHOTO_SIZE_MB=20
        PLACES365_MODEL_PATH=
        YOLO_MODEL_PATH=yolov8n.pt
        DEFAULT_EVENT_PIN=0000
        EOF
        sed -i 's/^[[:space:]]*//' .env
        echo "--- .env written ---"
        cat .env | grep -v SECRET | grep -v PASSWORD | grep -v KEY | grep -v TOKEN

    # 8 Build and start Docker stack
    - name: Start Docker containers
      env:
        DOCKER_BUILDKIT: "1"
        COMPOSE_DOCKER_CLI_BUILD: "1"
        BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
      run: |
        docker compose build --parallel
        docker compose up -d
        docker ps

    # 9 Wait for all services
    - name: Wait for services
      run: |
        wait_for() {
          local NAME="$1" URL="$2" MAX="$3" INTERVAL="$4"
          for i in $(seq 1 "$MAX"); do
            if curl -sf "$URL" >/dev/null 2>&1; then
              echo "$NAME ready (attempt $i)"
              return 0
            fi
            sleep "$INTERVAL"
          done
          echo "$NAME failed to start"
          return 1
        }

        wait_for "Backend"  "http://localhost:8000/docs" 40 3 & PID_BACKEND=$!
        wait_for "Frontend" "http://localhost:3000"      40 3 & PID_FRONTEND=$!
        wait_for "Nginx"    "http://localhost"           30 3 & PID_NGINX=$!

        FAIL=0
        wait "$PID_BACKEND"  || FAIL=1
        wait "$PID_FRONTEND" || FAIL=1
        wait "$PID_NGINX"    || FAIL=1

        if [ "$FAIL" -eq 1 ]; then
          docker compose logs backend  --tail=30
          docker compose logs frontend --tail=30
          docker compose logs nginx    --tail=30
          exit 1
        fi
        echo "All services ready"

    # 9.5 Stop celery_photo + disable restart policy
    - name: Stop celery_photo worker (Colab will handle photo tasks)
      run: |
        # Disable restart policy first so it never comes back
        docker update --restart=no event_celery_photo 2>/dev/null || true
        docker stop event_celery_photo 2>/dev/null || true

        # Verify
        STATUS=$(docker inspect \
          --format='{{.State.Status}}' event_celery_photo 2>/dev/null || echo "not found")
        RESTART=$(docker inspect \
          --format='{{.HostConfig.RestartPolicy.Name}}' \
          event_celery_photo 2>/dev/null || echo "unknown")

        echo "celery_photo status:  $STATUS"
        echo "celery_photo restart: $RESTART"

        if [ "$STATUS" = "exited" ]; then
          echo "✅ celery_photo stopped — Colab GPU worker will handle photo queue"
        else
          echo "⚠️ celery_photo may still be running — force killing..."
          docker kill event_celery_photo 2>/dev/null || true
        fi

        echo "--- All celery workers ---"
        docker ps --format '{{.Names}}\t{{.Status}}' | grep celery || true

    # 10 Seed default users
    - name: Seed default users
      run: |
        echo '' | base64 -d | docker exec -i event_backend python3

    # 11 Install cloudflared
    - name: Install Cloudflare tunnel
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        cloudflared --version

    # 12 Start Cloudflare Tunnels (app + minio)
    - name: Start Cloudflare Tunnels
      run: |
        start_tunnel() {
          local NAME="$1" TARGET="$2" LOGFILE="$3"
          for attempt in 1 2 3 4 5; do
            pkill -f "cloudflared tunnel.*$TARGET" 2>/dev/null || true
            sleep 2
            rm -f "$LOGFILE"
            cloudflared tunnel --url "$TARGET" > "$LOGFILE" 2>&1 &
            local TPID=$!
            local FOUND=""
            for i in $(seq 1 40); do
              sleep 1
              if ! kill -0 "$TPID" 2>/dev/null; then
                echo "  $NAME attempt $attempt: cloudflared process died early"
                break
              fi
              FOUND=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' \
                "$LOGFILE" | head -n 1)
              [ -n "$FOUND" ] && break
            done
            if [ -n "$FOUND" ] && kill -0 "$TPID" 2>/dev/null; then
              sleep 2
              if kill -0 "$TPID" 2>/dev/null; then
                echo "$NAME=$FOUND" >> /tmp/tunnel_urls
                echo "$NAME tunnel ready: $FOUND"
                return 0
              else
                echo "  $NAME attempt $attempt: tunnel died after printing URL"
              fi
            fi
            echo "  $NAME attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: $NAME tunnel failed after 5 attempts"
          cat "$LOGFILE"
          return 1
        }

        start_tunnel "PREVIEW_URL"      "http://localhost:80"   "tunnel-app.log"   & PID_APP=$!
        start_tunnel "MINIO_TUNNEL_URL" "http://localhost:9000" "tunnel-minio.log" & PID_MINIO=$!

        FAIL=0
        wait "$PID_APP"   || FAIL=1
        wait "$PID_MINIO" || FAIL=1
        [ "$FAIL" -eq 1 ] && exit 1

        PREVIEW_URL=$(grep '^PREVIEW_URL=' /tmp/tunnel_urls | cut -d= -f2-)
        MINIO_TUNNEL_URL=$(grep '^MINIO_TUNNEL_URL=' /tmp/tunnel_urls | cut -d= -f2-)
        echo "PREVIEW_URL=$PREVIEW_URL"           >> "$GITHUB_ENV"
        echo "MINIO_TUNNEL_URL=$MINIO_TUNNEL_URL" >> "$GITHUB_ENV"

        echo "================================="
        echo " SnapFind Preview is LIVE"
        echo " App URL:      $PREVIEW_URL"
        echo " API docs:     $PREVIEW_URL/api/docs"
        echo " MinIO tunnel: $MINIO_TUNNEL_URL"
        echo "================================="

    # 13 Inject MINIO_PRESIGN_ENDPOINT + wait for backend properly
    - name: Inject MinIO presign endpoint into backend
      run: |
        echo "MINIO_PRESIGN_ENDPOINT = $MINIO_TUNNEL_URL"
        sed -i "s|MINIO_PRESIGN_ENDPOINT=.*|MINIO_PRESIGN_ENDPOINT=$MINIO_TUNNEL_URL|" .env

        MINIO_PRESIGN_ENDPOINT="$MINIO_TUNNEL_URL" \
          docker compose up -d --no-deps --force-recreate backend

        # Wait up to 3 minutes for backend — InsightFace takes time to load
        echo "Waiting for backend to be ready (up to 3 min)..."
        READY=false
        for i in $(seq 1 90); do
          if curl -sf http://localhost:8000/docs >/dev/null 2>&1; then
            echo "✅ Backend ready at attempt $i ($((i*2))s)"
            READY=true
            break
          fi
          # Print logs every 30s to see progress
          if (( i % 15 == 0 )); then
            echo "--- Backend logs at ${i*2}s ---"
            docker logs event_backend --tail=15 2>&1
            echo "---"
          fi
          sleep 2
        done

        if [ "$READY" = "false" ]; then
          echo "❌ Backend failed to start in 3 minutes"
          echo "=== Full backend logs ==="
          docker logs event_backend --tail=60 2>&1
          exit 1
        fi

        # Restart other celery workers so they connect to recreated backend network
        for WORKER in event_celery_finalize event_celery_ai \
                      event_celery_default event_celery_beat; do
          docker restart "$WORKER" 2>/dev/null || true
          echo "  restarted $WORKER"
        done

        # Re-stop + re-disable celery_photo restart policy
        docker update --restart=no event_celery_photo 2>/dev/null || true
        docker stop event_celery_photo 2>/dev/null || true
        echo "✅ celery_photo re-stopped after backend recreate"

        # Confirm
        STATUS=$(docker inspect \
          --format='{{.State.Status}}' event_celery_photo 2>/dev/null)
        echo "celery_photo status: $STATUS"

        BACKEND=$(docker ps --format '{{.Names}}' | grep -i backend | head -n1)
        LIVE=$(docker exec "$BACKEND" printenv MINIO_PRESIGN_ENDPOINT 2>/dev/null || true)
        if [ "$LIVE" = "$MINIO_TUNNEL_URL" ]; then
          echo "✅ MINIO_PRESIGN_ENDPOINT confirmed: $LIVE"
        else
          echo "ERROR: Got '$LIVE', Expected '$MINIO_TUNNEL_URL'"
          exit 1
        fi

    # 14 Start Redis + Postgres TCP tunnels via Pinggy
    - name: Start Redis + Postgres TCP tunnels (Pinggy)
      run: |
        echo "Starting Pinggy TCP tunnels for Redis + Postgres..."

        # ── Redis tunnel ──
        ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ExitOnForwardFailure=yes \
            -o LogLevel=VERBOSE \
            -R 0:localhost:6379 \
            -p 443 \
            tcp@a.pinggy.io \
            > /tmp/pinggy-redis.log 2>&1 &
        REDIS_PID=$!
        echo "Redis tunnel PID: $REDIS_PID"

        # Small delay so Pinggy assigns different ports
        sleep 4

        # ── Postgres tunnel ──
        ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ExitOnForwardFailure=yes \
            -o LogLevel=VERBOSE \
            -R 0:localhost:5432 \
            -p 443 \
            tcp@a.pinggy.io \
            > /tmp/pinggy-db.log 2>&1 &
        DB_PID=$!
        echo "Postgres tunnel PID: $DB_PID"

        # Wait up to 40s for both URLs
        for i in $(seq 1 40); do
          sleep 1
          REDIS_TUNNEL=$(grep -oP 'tcp://[a-zA-Z0-9\.\-]+:[0-9]+' \
            /tmp/pinggy-redis.log | head -1 | sed 's|tcp://||')
          DB_TUNNEL=$(grep -oP 'tcp://[a-zA-Z0-9\.\-]+:[0-9]+' \
            /tmp/pinggy-db.log | head -1 | sed 's|tcp://||')

          if [ -n "$REDIS_TUNNEL" ] && [ -n "$DB_TUNNEL" ]; then
            echo "✅ Both tunnels ready at attempt $i"
            break
          fi

          if ! kill -0 "$REDIS_PID" 2>/dev/null; then
            echo "❌ Redis Pinggy process died"
            cat /tmp/pinggy-redis.log
            exit 1
          fi
          if ! kill -0 "$DB_PID" 2>/dev/null; then
            echo "❌ Postgres Pinggy process died"
            cat /tmp/pinggy-db.log
            exit 1
          fi
          echo "  waiting... redis=$REDIS_TUNNEL db=$DB_TUNNEL ($i/40)"
        done

        if [ -z "$REDIS_TUNNEL" ] || [ -z "$DB_TUNNEL" ]; then
          echo "❌ One or both tunnels failed to start"
          echo "=== Redis log ===" && cat /tmp/pinggy-redis.log
          echo "=== DB log ===" && cat /tmp/pinggy-db.log
          exit 1
        fi

        REDIS_HOST=$(echo $REDIS_TUNNEL | cut -d: -f1)
        REDIS_PORT=$(echo $REDIS_TUNNEL | cut -d: -f2)
        DB_HOST=$(echo $DB_TUNNEL    | cut -d: -f1)
        DB_PORT=$(echo $DB_TUNNEL    | cut -d: -f2)

        echo "REDIS_TUNNEL=$REDIS_TUNNEL" >> $GITHUB_ENV
        echo "REDIS_HOST=$REDIS_HOST"     >> $GITHUB_ENV
        echo "REDIS_PORT=$REDIS_PORT"     >> $GITHUB_ENV
        echo "DB_TUNNEL=$DB_TUNNEL"       >> $GITHUB_ENV
        echo "DB_HOST=$DB_HOST"           >> $GITHUB_ENV
        echo "DB_PORT=$DB_PORT"           >> $GITHUB_ENV

        echo "================================="
        echo " Redis TCP:    $REDIS_TUNNEL"
        echo " Postgres TCP: $DB_TUNNEL"
        echo "================================="

    # 15 Verify tunnels + auto-fix port swap
    - name: Verify tunnels + auto-fix port swap
      run: |
        echo "=== Verifying Redis tunnel ==="
        REDIS_RESP=$(docker exec event_redis \
          redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" \
          PING 2>/dev/null || true)
        echo "Redis response: '$REDIS_RESP'"

        echo "=== Verifying Postgres tunnel ==="
        PG_OK=false
        for i in $(seq 1 10); do
          if PGPASSWORD=admin123 psql \
              -h "$DB_HOST" -p "$DB_PORT" \
              -U postgres -d event_ai \
              -c "SELECT 1;" >/dev/null 2>&1; then
            PG_OK=true
            echo "✅ Postgres tunnel working"
            break
          fi
          sleep 3
        done
        $PG_OK || echo "⚠️ Postgres tunnel check failed"

        # Auto-detect and fix port swap
        if echo "$REDIS_RESP" | grep -q "PONG"; then
          echo "✅ Redis confirmed on $REDIS_TUNNEL"
        else
          echo "⚠️ Redis not responding — checking if ports swapped..."
          SWAP_RESP=$(docker exec event_redis \
            redis-cli -h "$DB_HOST" -p "$DB_PORT" \
            PING 2>/dev/null || true)
          if echo "$SWAP_RESP" | grep -q "PONG"; then
            echo "🔄 Ports swapped — fixing..."
            ORIG_REDIS=$REDIS_TUNNEL
            ORIG_DB=$DB_TUNNEL
            ORIG_RH=$REDIS_HOST
            ORIG_RP=$REDIS_PORT
            ORIG_DH=$DB_HOST
            ORIG_DP=$DB_PORT
            echo "REDIS_TUNNEL=$ORIG_DB"   >> $GITHUB_ENV
            echo "REDIS_HOST=$ORIG_DH"     >> $GITHUB_ENV
            echo "REDIS_PORT=$ORIG_DP"     >> $GITHUB_ENV
            echo "DB_TUNNEL=$ORIG_REDIS"   >> $GITHUB_ENV
            echo "DB_HOST=$ORIG_RH"        >> $GITHUB_ENV
            echo "DB_PORT=$ORIG_RP"        >> $GITHUB_ENV
            echo "✅ Swapped: Redis=$ORIG_DB  Postgres=$ORIG_REDIS"
          else
            echo "⚠️ Could not confirm Redis — tunnel may need more time"
          fi
        fi

        echo ""
        echo "================================="
        echo " Final tunnel assignments:"
        echo " Redis:    $REDIS_TUNNEL"
        echo " Postgres: $DB_TUNNEL"
        echo "================================="

    # 15.5 Test Redis + Postgres internally
    - name: Test Redis + Postgres internally
      run: |
        echo "=== Internal Redis ==="
        docker exec event_redis redis-cli ping

        echo "=== Internal Postgres ==="
        docker exec event_postgres pg_isready

        echo "=== Backend health ==="
        curl -sf http://localhost:8000/docs \
          && echo "✅ Backend healthy" \
          || echo "⚠️ Backend not ready yet"

    # 16 Start Pinggy watchdog
    - name: Start Pinggy watchdog
      run: |
        (
          while true; do
            sleep 30

            # ── Check + restart Redis tunnel ──
            REDIS_OK=$(docker exec event_redis \
              redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" \
              PING 2>/dev/null || echo "FAIL")

            if ! echo "$REDIS_OK" | grep -q "PONG"; then
              echo "[pinggy watchdog] Redis tunnel dead — restarting at $(date)"
              pkill -f "ssh.*6379" 2>/dev/null || true
              sleep 3
              ssh -o StrictHostKeyChecking=no \
                  -o ServerAliveInterval=30 \
                  -o ExitOnForwardFailure=yes \
                  -R 0:localhost:6379 -p 443 \
                  tcp@a.pinggy.io \
                  >> /tmp/pinggy-redis.log 2>&1 &
              sleep 12
              NEW_REDIS=$(grep -oP 'tcp://[a-zA-Z0-9\.\-]+:[0-9]+' \
                /tmp/pinggy-redis.log | tail -1 | sed 's|tcp://||')
              if [ -n "$NEW_REDIS" ]; then
                REDIS_HOST=$(echo $NEW_REDIS | cut -d: -f1)
                REDIS_PORT=$(echo $NEW_REDIS | cut -d: -f2)
                echo "REDIS_TUNNEL=$NEW_REDIS" >> $GITHUB_ENV
                echo "REDIS_HOST=$REDIS_HOST"  >> $GITHUB_ENV
                echo "REDIS_PORT=$REDIS_PORT"  >> $GITHUB_ENV
                echo "[watchdog] ✅ New Redis: $NEW_REDIS"
              fi
            fi

            # ── Check + restart Postgres tunnel ──
            PG_OK=$(PGPASSWORD=admin123 psql \
              -h "$DB_HOST" -p "$DB_PORT" \
              -U postgres -d event_ai \
              -c "SELECT 1;" 2>/dev/null && echo "OK" || echo "FAIL")

            if ! echo "$PG_OK" | grep -q "OK"; then
              echo "[pinggy watchdog] DB tunnel dead — restarting at $(date)"
              pkill -f "ssh.*5432" 2>/dev/null || true
              sleep 3
              ssh -o StrictHostKeyChecking=no \
                  -o ServerAliveInterval=30 \
                  -o ExitOnForwardFailure=yes \
                  -R 0:localhost:5432 -p 443 \
                  tcp@a.pinggy.io \
                  >> /tmp/pinggy-db.log 2>&1 &
              sleep 12
              NEW_DB=$(grep -oP 'tcp://[a-zA-Z0-9\.\-]+:[0-9]+' \
                /tmp/pinggy-db.log | tail -1 | sed 's|tcp://||')
              if [ -n "$NEW_DB" ]; then
                DB_HOST=$(echo $NEW_DB | cut -d: -f1)
                DB_PORT=$(echo $NEW_DB | cut -d: -f2)
                echo "DB_TUNNEL=$NEW_DB"   >> $GITHUB_ENV
                echo "DB_HOST=$DB_HOST"    >> $GITHUB_ENV
                echo "DB_PORT=$DB_PORT"    >> $GITHUB_ENV
                echo "[watchdog] ✅ New DB: $NEW_DB"
              fi
            fi

            # ── Keep celery_photo stopped ──
            PHOTO_STATUS=$(docker inspect \
              --format='{{.State.Status}}' \
              event_celery_photo 2>/dev/null || echo "not found")
            if [ "$PHOTO_STATUS" = "running" ]; then
              echo "[watchdog] celery_photo restarted itself — stopping again"
              docker update --restart=no event_celery_photo 2>/dev/null || true
              docker stop event_celery_photo 2>/dev/null || true
            fi

          done
        ) > /tmp/pinggy-watchdog.log 2>&1 &
        disown $!
        echo "✅ Pinggy watchdog started (PID=$!)"

    # 17 pgweb (Postgres browser UI)
    - name: Start pgweb (Postgres UI)
      if: ${{ github.event.inputs.enable_db_ui == 'true' }}
      run: |
        if docker inspect event_postgres >/dev/null 2>&1; then
          PG_CONTAINER="event_postgres"
        else
          PG_CONTAINER=$(docker ps --format '{{.Names}} {{.Image}}' \
            | grep -i postgres | awk '{print $1}' | head -1)
        fi

        DB_USER=$(docker exec "$PG_CONTAINER" \
          printenv POSTGRES_USER     2>/dev/null || echo "postgres")
        DB_PASS=$(docker exec "$PG_CONTAINER" \
          printenv POSTGRES_PASSWORD 2>/dev/null || echo "admin123")
        DB_NAME=$(docker exec "$PG_CONTAINER" \
          printenv POSTGRES_DB       2>/dev/null || echo "event_ai")
        PG_IP=$(docker inspect \
          -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' \
          "$PG_CONTAINER" | head -1)

        COMPOSE_NETWORK=$(docker network ls \
          --filter "label=com.docker.compose.project" \
          --format "{{.Name}}" | head -1)

        DB_URL="postgres://${DB_USER}:${DB_PASS}@${PG_IP}:5432/${DB_NAME}?sslmode=disable"

        docker rm -f pgweb 2>/dev/null || true
        docker run -d \
          --name pgweb \
          --network "${COMPOSE_NETWORK:-host}" \
          -p 8081:8081 \
          sosedoff/pgweb \
          pgweb --bind=0.0.0.0 --listen=8081 --url="$DB_URL"

        for i in {1..15}; do
          curl -sf http://localhost:8081 >/dev/null && echo "pgweb ready" && break
          sleep 2
        done

        start_pgweb_tunnel() {
          for attempt in $(seq 1 5); do
            pkill -f "cloudflared tunnel.*8081" 2>/dev/null || true
            sleep 2
            rm -f /tmp/pgweb-tunnel.log
            cloudflared tunnel --url http://localhost:8081 \
              > /tmp/pgweb-tunnel.log 2>&1 &
            local TPID=$!
            local URL=""
            for i in $(seq 1 40); do
              sleep 1
              kill -0 "$TPID" 2>/dev/null || break
              URL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' \
                /tmp/pgweb-tunnel.log | head -1)
              [ -n "$URL" ] && break
            done
            if [ -n "$URL" ] && kill -0 "$TPID" 2>/dev/null; then
              sleep 2
              if kill -0 "$TPID" 2>/dev/null; then
                echo "$URL" > /tmp/pgweb_url
                echo "pgweb tunnel ready: $URL"
                return 0
              fi
            fi
            echo "  pgweb tunnel attempt $attempt failed"
            sleep 5
          done
        }

        start_pgweb_tunnel
        PGWEB_URL=$(cat /tmp/pgweb_url 2>/dev/null || echo "")
        echo "PGWEB_URL=$PGWEB_URL" >> "$GITHUB_ENV"
        echo "================================="
        echo " pgweb DB UI: $PGWEB_URL"
        echo "================================="

        # pgweb watchdog
        (
          PGWEB_DB_URL="$DB_URL"
          PGWEB_NET="${COMPOSE_NETWORK:-host}"
          while true; do
            sleep 60
            if ! curl -sf --max-time 5 http://localhost:8081 >/dev/null 2>&1; then
              echo "[pgweb watchdog] Restarting pgweb at $(date)"
              docker rm -f pgweb 2>/dev/null || true
              sleep 1
              docker run -d --name pgweb \
                --network "$PGWEB_NET" \
                -p 8081:8081 sosedoff/pgweb \
                pgweb --bind=0.0.0.0 --listen=8081 --url="$PGWEB_DB_URL"
            fi
            if ! pgrep -f "cloudflared tunnel.*8081" >/dev/null 2>&1; then
              echo "[pgweb watchdog] Restarting tunnel at $(date)"
              cloudflared tunnel --url http://localhost:8081 \
                > /tmp/pgweb-tunnel.log 2>&1 &
              sleep 15
              NEW_URL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' \
                /tmp/pgweb-tunnel.log | head -1)
              [ -n "$NEW_URL" ] && echo "$NEW_URL" > /tmp/pgweb_url \
                && echo "[pgweb watchdog] New URL: $NEW_URL"
            fi
          done
        ) > /tmp/pgweb-watchdog.log 2>&1 &
        disown $!
        echo "pgweb watchdog started"

    # 18 MinIO Console tunnel
    - name: Start MinIO Console tunnel
      if: ${{ github.event.inputs.enable_minio_console == 'true' }}
      run: |
        cloudflared tunnel --url http://localhost:9001 \
          > /tmp/minio-console-tunnel.log 2>&1 &
        for i in $(seq 1 30); do
          sleep 1
          MINIO_CONSOLE_URL=$(grep -oP \
            'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' \
            /tmp/minio-console-tunnel.log | head -1)
          [ -n "$MINIO_CONSOLE_URL" ] && break
        done
        echo "MINIO_CONSOLE_URL=$MINIO_CONSOLE_URL" >> "$GITHUB_ENV"
        echo "MinIO Console: $MINIO_CONSOLE_URL"
        echo " User: minioadmin / minioadmin"

    # 19 Keep-alive loop
    - name: Keep preview alive
      if: always()
      env:
        PREVIEW_DURATION: ${{ github.event.inputs.duration_hours || '2' }}
        SHOW_CELERY_LOGS: ${{ github.event.inputs.show_celery_logs }}
      run: |
        print_urls() {
          local PGWEB_LIVE
          PGWEB_LIVE=$(cat /tmp/pgweb_url 2>/dev/null || echo "")
          echo ""
          echo "================================="
          echo " SnapFind Preview — LIVE URLS"
          echo "================================="
          echo " App:          $PREVIEW_URL"
          echo " API docs:     $PREVIEW_URL/api/docs"
          echo " MinIO:        $MINIO_TUNNEL_URL"
          echo "---------------------------------"
          echo " 🔌 Colab Connections"
          echo " Redis TCP:    $REDIS_TUNNEL"
          echo " Postgres TCP: $DB_TUNNEL"
          [ -n "$PGWEB_LIVE" ]        && echo " pgweb DB UI:  $PGWEB_LIVE"
          [ -n "$MINIO_CONSOLE_URL" ] && echo " MinIO UI:     $MINIO_CONSOLE_URL"
          echo "---------------------------------"
          echo " 🔑 Test Accounts"
          echo " Admin → admin@admin.com / 123456  (role: admin)"
          echo " User  → test@gmail.com  / 123456  (role: owner)"
          echo "================================="
        }

        print_urls

        # Verify admin role
        docker exec event_backend python3 -c "
        from app.database.db import SessionLocal
        from app.models.user import User
        db=SessionLocal()
        u=db.query(User).filter(User.email=='admin@admin.com').first()
        print('admin@admin.com role='+(u.role if u else 'NOT FOUND'))
        db.close()
        " 2>/dev/null || true

        # ── Log tailing ──
        CELERY_LOG=/tmp/celery_all.log
        > "$CELERY_LOG"

        tail_worker() {
          local CONTAINER="$1" LABEL="$2"
          docker logs -f --timestamps "$CONTAINER" 2>&1 \
            | sed -u "s/^/[$LABEL] /" >> "$CELERY_LOG" &
        }

        # NOTE: event_celery_photo is stopped — Colab handles it
        tail_worker event_celery_finalize "FINALIZE"
        tail_worker event_celery_ai       "AI      "
        tail_worker event_celery_default  "DEFAULT "
        tail_worker event_celery_beat     "BEAT    "
        tail_worker event_backend         "BACKEND "
        tail_worker event_frontend        "FRONTEND"

        [ -f /tmp/pgweb-watchdog.log ] && \
          tail -f /tmp/pgweb-watchdog.log \
          | sed -u 's/^/[PGWEB-WD] /' >> "$CELERY_LOG" &

        tail -f /tmp/pinggy-watchdog.log 2>/dev/null \
          | sed -u 's/^/[PINGGY-WD] /' >> "$CELERY_LOG" &

        LOG_OFFSET=0
        SECONDS_LEFT=$(( PREVIEW_DURATION * 3600 ))
        ITERATION=0

        for ((i=0; i<SECONDS_LEFT; i+=60)); do
          sleep 60
          ITERATION=$(( ITERATION + 1 ))
          REM=$(( (SECONDS_LEFT - i) / 60 ))

          echo ""
          echo "──────────────────────────────────────────"
          echo "[$REM min remaining]  $(date '+%H:%M:%S')"
          echo "──────────────────────────────────────────"

          # Health check directly on backend port (avoids nginx 502 confusion)
          curl -sf http://localhost:8000/docs >/dev/null \
            && echo "  ✓ Backend healthy" \
            || echo "  ⚠ WARNING: backend health check failed"

          if (( ITERATION % 5 == 0 )); then
            print_urls
          else
            PGWEB_LIVE=$(cat /tmp/pgweb_url 2>/dev/null || echo "")
            echo " App:      $PREVIEW_URL"
            echo " Redis:    $REDIS_TUNNEL"
            echo " Postgres: $DB_TUNNEL"
            [ -n "$PGWEB_LIVE" ] && echo " pgweb:    $PGWEB_LIVE"
          fi

          if [ "${SHOW_CELERY_LOGS}" != "false" ]; then
            TOTAL_LINES=$(wc -l < "$CELERY_LOG")
            NEW_LINES=$(( TOTAL_LINES - LOG_OFFSET ))
            if [ "$NEW_LINES" -gt 0 ]; then
              echo "--- Service logs (${NEW_LINES} new lines) ---"
              tail -n "$NEW_LINES" "$CELERY_LOG"
              echo "--- end ---"
            fi
            LOG_OFFSET=$TOTAL_LINES
          fi

          if (( ITERATION % 5 == 0 )); then
            echo "--- Container status ---"
            for C in event_backend event_frontend \
                     event_celery_photo \
                     event_celery_finalize event_celery_ai \
                     event_celery_default event_celery_beat pgweb; do
              STATUS=$(docker inspect \
                --format='{{.State.Status}}' "$C" 2>/dev/null || echo "not found")
              echo "  $C → $STATUS"
            done
            echo "------------------------"
          fi
        done

    # 20 Show logs on failure
    - name: Show logs on failure
      if: failure()
      run: |
        echo "===== BACKEND ====="
        docker compose logs backend         --tail=50
        echo "===== FRONTEND ====="
        docker compose logs frontend        --tail=50
        echo "===== NGINX ====="
        docker compose logs nginx           --tail=50
        echo "===== CELERY FINALIZE ====="
        docker compose logs celery_finalize --tail=50
        echo "===== CELERY AI ====="
        docker compose logs celery_ai       --tail=50
        echo "===== CELERY DEFAULT ====="
        docker compose logs celery_default  --tail=50
        echo "===== CELERY BEAT ====="
        docker compose logs celery_beat     --tail=50
        cat tunnel-app.log                  || true
        cat tunnel-minio.log                || true
        cat /tmp/pinggy-redis.log           || true
        cat /tmp/pinggy-db.log              || true
        cat /tmp/pinggy-watchdog.log        || true
        cat /tmp/pgweb-tunnel.log           || true
        docker logs pgweb 2>/dev/null       || true

    # 21 Cleanup
    - name: Cleanup
      if: always()
      run: |
        pkill cloudflared      || true
        pkill -f "ssh.*pinggy" || true
        docker compose down -v
        echo "Cleanup complete"