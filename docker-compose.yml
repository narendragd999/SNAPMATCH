version: "3.9"

# ============================================================
# SnapFind AI — Docker Compose
# Includes MinIO for local object storage.
# For Cloudflare R2: remove the minio service and update
# the STORAGE_BACKEND env vars in all services.
#
# OPTIMIZATION: All celery workers share one built image
# (snapfind-backend:latest) — saves 4-5x disk space.
# Only 'backend' has the build block; others reuse the image.
# Deploy with: .\deploy.ps1
# ============================================================

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: event_postgres
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB:       event_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: event_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────────
  # Access console at: http://localhost:9001
  # Username: minioadmin / Password: minioadmin
  minio:
    image: minio/minio:latest
    container_name: event_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend ──────────────────────────────────────────────────────────────────
  # This is the ONLY service that builds the image.
  # All celery workers below reuse snapfind-backend:latest.
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: snapfind-backend:latest
    container_name: event_backend
    shm_size: '512mb'                  # ← ADD THIS LINE
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - ALLOWED_ORIGINS=http://localhost:3000
      - SECRET_KEY=change-me-in-production
      - ENV=prod
      # ── Storage ──
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=snapfind
      - MINIO_PUBLIC_URL=/storage
      - MINIO_PRESIGN_ENDPOINT=${MINIO_PRESIGN_ENDPOINT:-}
      # ── Payments ──
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
    restart: unless-stopped

  # ── Photo Worker ─────────────────────────────────────────────────────────────
  celery_photo:
    image: snapfind-backend:latest   # reuses backend image — no rebuild
    #container_name: event_celery_photo
    shm_size: '2gb'                    # ← ADD THIS LINE
    command: celery -A app.workers.celery_worker worker -Q photo_processing --concurrency=2 --pool=prefork --loglevel=info --time-limit=180 --soft-time-limit=150 --without-mingle --without-gossip
    volumes:
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=snapfind
      - MINIO_PUBLIC_URL=/storage
    mem_limit: 4g
    restart: unless-stopped

  # ── Finalizer Worker ─────────────────────────────────────────────────────────
  celery_finalize:
    image: snapfind-backend:latest   # reuses backend image — no rebuild
    container_name: event_celery_finalize
    command: >
      celery -A app.workers.celery_worker worker
      -Q event_finalize
      --concurrency=1
      --pool=solo
      --loglevel=info
      --time-limit=3600
      --soft-time-limit=3300
      --without-mingle
      --without-gossip
    volumes:
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=snapfind
      - MINIO_PUBLIC_URL=/storage
    mem_limit: 6g
    restart: unless-stopped

  # ── AI Enrichment Worker ──────────────────────────────────────────────────────
  celery_ai:
    image: snapfind-backend:latest   # reuses backend image — no rebuild
    container_name: event_celery_ai
    shm_size: '1gb'                    # ← ADD THIS LINE
    command: >
      celery -A app.workers.celery_worker worker
      -Q ai_enrichment
      --pool=solo
      --loglevel=info
      --time-limit=7200
      --soft-time-limit=7000
      --without-mingle
      --without-gossip
    volumes:
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=snapfind
      - MINIO_PUBLIC_URL=/storage
      - PLACES365_MODEL_PATH=/app/models/resnet50_places365.pth.tar
      - YOLO_MODEL_PATH=yolov8n.pt
    mem_limit: 4g
    restart: unless-stopped

  # ── Default Worker ────────────────────────────────────────────────────────────
  celery_default:
    image: snapfind-backend:latest   # reuses backend image — no rebuild
    container_name: event_celery_default
    command: >
      celery -A app.workers.celery_worker worker
      -Q default
      --pool=solo
      --loglevel=info
      --time-limit=600
      --soft-time-limit=540
      --without-mingle
      --without-gossip
    volumes:
      - insightface_models:/root/.insightface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=snapfind
      - MINIO_PUBLIC_URL=/storage
    restart: unless-stopped

  # ── Beat Scheduler ────────────────────────────────────────────────────────────
  celery_beat:
    image: snapfind-backend:latest   # reuses backend image — no rebuild
    container_name: event_celery_beat
    command: celery -A app.workers.celery_worker beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
      - NEXT_PUBLIC_API_URL=/api      # ← baked into Next.js at build time
    image: snapfind-frontend:latest
    container_name: event_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_STORAGE_URL=/storage
      - NEXT_PUBLIC_STORAGE_BACKEND=minio

  nginx:
    image: nginx:alpine
    container_name: event_proxy
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  insightface_models:
