# ============================================================
# SnapFind AI - Docker Compose (localhost-compatible)
# ============================================================
# KEY CHANGES vs GitHub-Actions version:
#   1. nginx port driven by NGINX_PORT env var (8080 local, 80 on GHA)
#   2. backend ALLOWED_ORIGINS includes localhost:80 + localhost:3000
#   3. MINIO_PRESIGN_ENDPOINT defaults to http://localhost:9000 so
#      boto3 presigned URLs are signed with a host the BROWSER can reach.
#   4. All NEXT_PUBLIC_* vars already use relative paths (/api, /storage)
#      so they work behind nginx on any host without rebuilding.
# ============================================================

services:

  # -- PostgreSQL --
  postgres:
    image: postgres:15-alpine
    container_name: event_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: event_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c listen_addresses='*'
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -- Redis --
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    container_name: event_redis
    #command: redis-server --bind 0.0.0.0 --protected-mode no  -----------#old version
    # ★★★ ADD THESE CONFIGURATION OPTIONS ★★★
    command: >
      redis-server 
      --maxmemory 2gb 
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    deploy:
      resources:
        limits:
          memory: 2500M  # Hard limit
    restart: unless-stopped    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    

  # -- MinIO --
  # S3 API  -> http://localhost:9000
  # Console -> http://localhost:9001  (user: minioadmin / minioadmin)
  minio:
    image: minio/minio:latest
    container_name: event_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -- Backend --
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: snapfind-backend:latest
    container_name: event_backend
    shm_size: '512mb'
    volumes:
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # These override / supplement .env for Docker-internal wiring
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      # Database connection for entrypoint script (migration check)
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - DB_NAME=event_ai
      # Allow requests from nginx (port 80), direct frontend (3000), and
      # direct backend access (8000) - all used during local development.
      # On GHA nginx is port 80 (localhost), locally port 8080 (127.0.0.1:8080)
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:3000,http://localhost:8000,http://127.0.0.1:8080,http://127.0.0.1:3000,http://127.0.0.1:8000
      - ENV=${ENV:-dev}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      # -- Email Configuration --
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-smtp}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      # SendGrid
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-}
      # Brevo
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - BREVO_FROM_EMAIL=${BREVO_FROM_EMAIL:-}
      # Resend
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-}
      # -- OTP Configuration --
      - DEV_COMMON_OTP=${DEV_COMMON_OTP:-123456}
      - OTP_EXPIRY_MINUTES=${OTP_EXPIRY_MINUTES:-10}
      - OTP_LENGTH=${OTP_LENGTH:-6}
      - OTP_MAX_ATTEMPTS=${OTP_MAX_ATTEMPTS:-5}
      # AI models
      - MAX_PHOTO_SIZE_MB=${MAX_PHOTO_SIZE_MB:-20}
      - PLACES365_MODEL_PATH=${PLACES365_MODEL_PATH:-/app/models/resnet50_places365.pth.tar}
      - YOLO_MODEL_PATH=${YOLO_MODEL_PATH:-yolov8n.pt}
      - DEFAULT_EVENT_PIN=${DEFAULT_EVENT_PIN:-0000}
      # -- Storage --
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=snapfind
      - MINIO_PUBLIC_URL=/storage
      # Presign endpoint = what the BROWSER sends PUT requests to.
      # Locally: http://localhost:9000 (MinIO port mapped to host)
      # GitHub Actions: Cloudflare tunnel URL injected by preview.yml
      - MINIO_PRESIGN_ENDPOINT=${MINIO_PRESIGN_ENDPOINT:-http://localhost:9000}
      # -- Payments --
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
    restart: unless-stopped

  # -- Photo Worker --
  # TUNED FOR: 2-core / 4-thread CPU, ~1.5GB RAM available for this worker
  #
  # --concurrency=2 -> 1 worker per real CPU core. More workers = thrashing
  #                    on a 2-core machine. Each InsightFace worker needs
  #                    ~500MB RAM, so 2 workers = ~1GB - safe given constraints.
  # --prefetch-multiplier=1 -> don't pre-fetch; avoids holding tasks in memory
  #                    when RAM is tight.
  # OMP_NUM_THREADS=2 -> each worker gets both logical cores for ONNX math.
  #                    2 workers x 2 threads = 4 (all logical processors used).
  celery_photo:
    image: snapfind-backend:latest
    container_name: event_celery_photo
    
    # ★ CRITICAL: Large shared memory for ONNX/numpy arrays ★
    shm_size: '4gb'               # Was 512mb! Needed for face detection
    
    command: >
      celery -A app.workers.celery_worker worker
        --hostname=gha-worker-%h
        --concurrency=6             # ★ CHANGED: 4→6 (use all 4 cores efficiently)
        --queues=photo_processing,event_finalize,ai_enrichment,default
        --prefetch-multiplier=3     # ★ CHANGED: 2→3 (keep pipeline full)
        --max-tasks-per-child=150   # ★ CHANGED: 50→150 (less restart overhead)
        -Ofair                      # Fair task distribution
        --time-limit=300            # 5 min hard limit
        --soft-time-limit=270       # 4.5 min soft limit (graceful cleanup)
        --loglevel=info
    
    volumes:
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
      
      # ★ ULTRA-FAST TEMP STORAGE (RAM DISK!) ★
      # All downloads + processing happen here = 10x faster than SSD!
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 8gb                # 8GB RAM-disk for temp files
          mode: 1777               # World-writable (needed by multiple processes)
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    
    # ★ USE ALL AVAILABLE RESOURCES ON GHA ★
    deploy:
      resources:
        limits:
          cpus: '4'                # ★ CHANGED: 2→4 (USE ALL CORES!)
          memory: 14500M           # ★ CHANGED: 4096M→14500M (USE ALMOST ALL RAM!)
        reservations:
          cpus: '4'                # Reserve all cores upfront
          memory: 14000M           # Reserve 14GB upfront
    
    environment:
      # Database & Redis
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      
      # Storage
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=snapfind
      - MINIO_PUBLIC_URL=/storage
      - MINIO_PRESIGN_ENDPOINT=${MINIO_PRESIGN_ENDPOINT:-http://localhost:9000}
      
      # ── ★ CRITICAL CPU THREADING SETTINGS ★ ──
      # Each worker gets dedicated core time, no thread contention!
      - OMP_NUM_THREADS=1              # OpenMP: 1 thread per worker
      - OPENBLAS_NUM_THREADS=1         # BLAS: single-threaded
      - MKL_NUM_THREADS=1              # Intel MKL: single-threaded  
      - ONNXRUNTIME_NUM_THREADS=1      # ★ SUPER IMPORTANT: ONNX Runtime threading
      
      # ── ★ MEMORY MANAGEMENT ★ ──
      - MAX_MEMORY_MB=13000            # Stay under 14.5GB limit
      - PYTHONDONTWRITEBYTECODE=1      # Don't write .pyc files (save I/O)
      
      # ── ★ PROCESSING TUNING ★ ──
      - EMBEDDINGS_STORAGE=redis
      - MAX_REDIS_VALUE_MB=50
      - EMBEDDINGS_TTL_HOURS=24
      - FINALIZE_CHUNK_SIZE=1000
      - DB_COMMIT_CHUNK=500
      - MERGE_CLUSTER_CAP=2000
      - CELERY_PHOTO_BATCH_SIZE=10     # ★ CHANGED: 5→10 (larger batches)
      - MAX_FACES_PER_PHOTO_FOR_COOCCURRENCE=25
      - ENABLE_COOCCURRENCE=true
      - CLUSTER_MERGE_THRESHOLD=0.72
      - WORKER_MAX_TASKS_PER_CHILD=150 # Match --max-tasks-per-child
      
      # ── ★ GHA-SPECIFIC SETTINGS ★ ──
      - USE_GPU=false                  # No GPU on standard GHA runners
      - GHA_OPTIMIZED=true             # Flag for code to use GHA-specific paths
      
    restart: unless-stopped
    scale: 1                           # Single scaled instance (parallelism via concurrency)


  # -- Finalizer Worker --
  # Builds FAISS index from processed face embeddings.
  # solo pool (single process) is correct here - FAISS index build is
  # single-threaded by design. OMP threads let it use all cores for the
  # actual vector math during index construction.
  celery_finalize:
    image: snapfind-backend:latest
    container_name: event_celery_finalize
    command: >
      celery -A app.workers.celery_worker worker
      -Q event_finalize
      --concurrency=1
      --pool=solo
      --loglevel=info
      --time-limit=3600
      --soft-time-limit=3300
      --without-mingle
      --without-gossip
    volumes:
      - ./indexes:/app/indexes
      - insightface_models:/root/.insightface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=snapfind
      - MINIO_PUBLIC_URL=/storage
      # Give finalizer full CPU for FAISS index build
      - OMP_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
      - MKL_NUM_THREADS=4
    mem_limit: 2g
    restart: "no"

  # -- AI Enrichment Worker --
  # Runs YOLO + Places365. Solo pool is correct (models loaded once in memory).
  celery_ai:
    image: snapfind-backend:latest
    container_name: event_celery_ai
    shm_size: '1gb'
    command: >
      celery -A app.workers.celery_worker worker
      -Q ai_enrichment
      --pool=solo
      --loglevel=info
      --time-limit=7200
      --soft-time-limit=7000
      --without-mingle
      --without-gossip
    volumes:
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=snapfind
      - MINIO_PUBLIC_URL=/storage
      - PLACES365_MODEL_PATH=/app/models/resnet50_places365.pth.tar
      - YOLO_MODEL_PATH=yolov8n.pt
      # YOLO and Places365 are both single-process - give them full CPU
      - OMP_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
      - MKL_NUM_THREADS=4
    mem_limit: 2g
    restart: unless-stopped

  # -- Default Worker --
  celery_default:
    image: snapfind-backend:latest
    container_name: event_celery_default
    command: >
      celery -A app.workers.celery_worker worker
      -Q default
      --pool=solo
      --loglevel=info
      --time-limit=600
      --soft-time-limit=540
      --without-mingle
      --without-gossip
    volumes:
      - insightface_models:/root/.insightface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=snapfind
      - MINIO_PUBLIC_URL=/storage
    restart: unless-stopped

  # -- Beat Scheduler --
  celery_beat:
    image: snapfind-backend:latest
    container_name: event_celery_beat
    command: celery -A app.workers.celery_worker beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai
      - CELERY_BROKER_URL=redis://redis:6379/0
    restart: unless-stopped

  # -- Frontend --
  # NEXT_PUBLIC_* vars are BAKED INTO the JS bundle at build time via args.
  # They must be absolute URLs the browser can reach, not Docker-internal names.
  #
  # LOCAL (Windows): set in .env:
  #   NGINX_PORT=8080
  #   NEXT_PUBLIC_APP_URL=http://127.0.0.1:8080
  #
  # GHA (Linux): leave both unset -> defaults to port 80 / http://localhost
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_APP_URL controls what gets baked into the JS bundle.
        # LOCAL: set to http://127.0.0.1:8080 in .env -> absolute URL
        # GHA: set to empty string in .env -> /api (relative)
        # The conditional is handled in the shell: if the var is set and
        # non-empty, append /api; otherwise use bare /api with no host.
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
        - NEXT_PUBLIC_STORAGE_URL=${NEXT_PUBLIC_STORAGE_URL:-/storage}
        - NEXT_PUBLIC_STORAGE_BACKEND=minio
    image: snapfind-frontend:latest
    container_name: event_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - NEXT_PUBLIC_STORAGE_URL=${NEXT_PUBLIC_STORAGE_URL:-/storage}
      - NEXT_PUBLIC_STORAGE_BACKEND=minio

  # -- Nginx reverse proxy --
  # Routes: /  -> frontend:3000
  #         /api/ -> backend:8000
  #         /storage/ -> minio:9000/snapfind/
  #         /minio-upload/ -> minio:9000/
  # LOCAL: NGINX_PORT=8080 in .env -> http://127.0.0.1:8080
  # GHA: NGINX_PORT unset -> port 80 -> http://localhost
  nginx:
    image: nginx:alpine
    container_name: event_proxy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  insightface_models: