name: SnapFind GPU Preview

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Hours to keep alive"
        required: false
        default: "3"
        type: choice
        options: ["1", "2", "3", "5"]

jobs:
  gpu_preview:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:

    # ── 1. Checkout ──────────────────────────────────────────────────────────
    - name: Checkout
      uses: actions/checkout@v4

    # ── 2. Free disk ─────────────────────────────────────────────────────────
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
        df -h

    # ── 3. Write .env — ALL services use Upstash Redis ───────────────────────
    - name: Write .env
      run: |
        cat > .env << 'EOF'
        SECRET_KEY=${{ secrets.SECRET_KEY || 'gpu-test-secret' }}
        ENV=prod

        # ── Broker: Upstash Redis (shared with Colab GPU) ──
        CELERY_BROKER_URL=${{ secrets.UPSTASH_REDIS_URL }}

        # ── App database: local PostgreSQL ─────────────────
        DATABASE_URL=postgresql://postgres:admin123@postgres:5432/event_ai

        # ── Storage: MinIO ─────────────────────────────────
        STORAGE_BACKEND=minio
        MINIO_ENDPOINT=http://minio:9000
        MINIO_ACCESS_KEY=minioadmin
        MINIO_SECRET_KEY=minioadmin
        MINIO_BUCKET=snapfind
        MINIO_PUBLIC_URL=/storage
        MINIO_PRESIGN_ENDPOINT=

        # ── Payments ───────────────────────────────────────
        RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
        RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}

        # ── Frontend ───────────────────────────────────────
        NEXT_PUBLIC_API_URL=/api
        NEXT_PUBLIC_STORAGE_URL=/storage

        # ── GPU: disabled on GHA (no GPU hardware here) ────
        USE_GPU=false
        EOF
        sed -i 's/^[[:space:]]*//' .env
        echo "✅ .env written"

    # ── 4. Start Docker stack ─────────────────────────────────────────────────
    - name: Start Docker containers
      run: |
        docker compose up -d --build
        docker ps

    # ── 5. Wait for backend ───────────────────────────────────────────────────
    - name: Wait for backend
      run: |
        for i in {1..30}; do
          curl -sf http://localhost:8000/docs >/dev/null && echo "✅ Backend ready" && exit 0
          sleep 5
        done
        docker compose logs backend --tail=20
        exit 1

    # ── 6. Wait for app ───────────────────────────────────────────────────────
    - name: Wait for app
      run: |
        for i in {1..20}; do
          curl -sf http://localhost >/dev/null && echo "✅ App ready" && exit 0
          sleep 3
        done
        exit 1

    # ── 7. STOP celery_photo — Colab GPU replaces it ─────────────────────────
    - name: Stop CPU photo worker
      run: |
        docker compose stop celery_photo
        echo ""
        echo "✅ celery_photo STOPPED — Colab GPU will handle photo processing"
        echo ""
        echo "Running containers:"
        docker compose ps --format "table {{.Name}}\t{{.Status}}"

    # ── 8. Install cloudflared ────────────────────────────────────────────────
    - name: Install cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

    # ── 9. Start tunnels ──────────────────────────────────────────────────────
    - name: Start Cloudflare tunnels
      run: |
        start_tunnel() {
          local NAME="$1" TARGET="$2" LOGFILE="$3" VAR="$4"
          for attempt in 1 2 3; do
            pkill -f "cloudflared tunnel.*$TARGET" || true
            rm -f "$LOGFILE"; sleep 3
            cloudflared tunnel --url "$TARGET" > "$LOGFILE" 2>&1 &
            for i in $(seq 1 30); do
              sleep 1
              URL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' \
                    "$LOGFILE" | head -1)
              [ -n "$URL" ] && break
            done
            if [ -n "$URL" ]; then
              echo "$VAR=$URL" >> $GITHUB_ENV
              echo "✅ $NAME tunnel: $URL"
              return 0
            fi
          done
          echo "❌ $NAME tunnel failed"
          return 1
        }

        start_tunnel "App"   "http://localhost:80"   "tunnel-app.log"   "APP_URL"
        start_tunnel "MinIO" "http://localhost:9000" "tunnel-minio.log" "MINIO_URL"

    # ── 10. Inject MinIO presign URL into backend ─────────────────────────────
    - name: Inject MinIO presign endpoint
      run: |
        sed -i "s|MINIO_PRESIGN_ENDPOINT=.*|MINIO_PRESIGN_ENDPOINT=$MINIO_URL|" .env
        docker compose up -d --no-deps --force-recreate backend
        sleep 10
        curl -sf http://localhost:8000/docs >/dev/null && echo "✅ Backend ready"

    # ── 11. Print everything Colab needs ──────────────────────────────────────
    - name: Print Colab connection info
      run: |
        echo ""
        echo "╔══════════════════════════════════════════════════════════╗"
        echo "║        PASTE THESE INTO GOOGLE COLAB CELL 3             ║"
        echo "╠══════════════════════════════════════════════════════════╣"
        echo "║"
        echo "║  APP_URL   = \"$APP_URL\""
        echo "║  MINIO_URL = \"$MINIO_URL\""
        echo "║"
        echo "║  UPSTASH_URL = from your Upstash dashboard"
        echo "║  (same value as UPSTASH_REDIS_URL secret)"
        echo "║"
        echo "╚══════════════════════════════════════════════════════════╝"
        echo ""
        echo "Open app at: $APP_URL"
        echo "Upload photos, click Process Images — Colab GPU processes them"

    # ── 12. Keep alive ────────────────────────────────────────────────────────
    - name: Keep preview alive
      env:
        PREVIEW_DURATION: ${{ github.event.inputs.duration_hours || '3' }}
      run: |
        SECONDS_LEFT=$(( PREVIEW_DURATION * 3600 ))
        for ((i=0; i<SECONDS_LEFT; i+=60)); do
          sleep 60
          REM=$(( (SECONDS_LEFT - i) / 60 ))
          echo "[$REM min left] App: $APP_URL | MinIO: $MINIO_URL"
          curl -sf http://localhost:8000/docs >/dev/null || echo "⚠ Backend check failed"
        done

    # ── 13. Cleanup ───────────────────────────────────────────────────────────
    - name: Cleanup
      if: always()
      run: |
        pkill cloudflared || true
        docker compose down -v
        echo "✅ Cleanup done"